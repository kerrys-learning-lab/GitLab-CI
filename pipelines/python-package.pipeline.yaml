include:
  - project: $GITLABCI_DEFAULT_PIPELINE_PROJECT
    ref: $GITLABCI_DEFAULT_PIPELINE_REF
    file:
      - pipelines/.stages.yaml
      - pipelines/.defaults.yaml


# ----------------------------------------------------------------------------
# Builds and saves a Python package for this project
.build-python-package:
  stage: build
  script:
    - gitlab-ci  python --project-root ${GITLABCI_PYTHON_BUILD_CONTEXT:-.}
                        --build-type ${GITLABCI_PYTHON_BUILD_TYPE:-uvs}
                        build
  artifacts:
    paths:
      - ./dist
    expire_in: 1 week


# ----------------------------------------------------------------------------
# Runs the unit tests for the Python package
.test-python-package:
  stage: test
  before_script:
    - uv add --dev  pytest
                    pytest-cov
  script:
    - gitlab-ci  python --project-root ${GITLABCI_PYTHON_BUILD_CONTEXT:-.}
                        --build-type ${GITLABCI_PYTHON_BUILD_TYPE:-uv}
                        test
  rules:
    - if: $GITLABCI_PYTHON_UNITTESTS == true
      when: never
  needs: []
  artifacts:
    reports:
      junit: .build/test-results/unit-tests.xml
      coverage_report:
        coverage_format: cobertura
        path: .build/test-results/coverage.xml
    paths:
      - ./.build/test-results
    expire_in: 1 week


# ----------------------------------------------------------------------------
# Pushes this project's Python package to the container registry
.push-python-package:
  stage: publish
  script:
    - gitlab-ci  python --project-root ${GITLABCI_PYTHON_BUILD_CONTEXT:-.}
                        --build-type ${GITLABCI_PYTHON_BUILD_TYPE:-uv}
                        push
  rules:
    - if: $CI_COMMIT_REF_PROTECTED =~ /true/
    - if: $GITLABCI_PUSH_PYTHON_FORCE =~ /true/
