include:
  - project: $GITLABCI_DEFAULT_PIPELINE_PROJECT
    ref: $GITLABCI_DEFAULT_PIPELINE_REF
    file:
      - pipelines/.stages.yaml
      - pipelines/.defaults.yaml

.package-helm-chart:
  stage: build
  script:
    - mkdir -p ./.build/charts
    - gitlab-ci --verbose
                helm  build --chart-dir ${GITLABCI_CHART_DIR:-.}
                            --output-dir ./.build/charts
  artifacts:
    paths:
      - ./.build/charts
    expire_in: 1 week

.push-helm-chart:
  stage: publish
  script:
    - gitlab-ci helm  push  --channel stable
                            ./.build/charts/*.tgz
  rules:
    - if: $CI_COMMIT_REF_PROTECTED =~ /true/
    - if: $GITLABCI_PUSH_CHART_FORCE =~ /true/
