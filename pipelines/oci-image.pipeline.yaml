include:
  - project: $GITLABCI_DEFAULT_PIPELINE_PROJECT
    ref: $GITLABCI_DEFAULT_PIPELINE_REF
    file:
      - pipelines/.stages.yaml
      - pipelines/.defaults.yaml

.configure-registries:
  script:
    - export EPHEMERAL_REGISTRY_CONF_PATH=/etc/containers/registries.conf.d/ephemeral-registry.conf
    - |
      if [[ -n "${GITLABCI_EPHEMERAL_REGISTRY_URL}" && ! -f ${EPHEMERAL_REGISTRY_CONF_PATH} ]]; then
        cat > ${EPHEMERAL_REGISTRY_CONF_PATH} <<__EOF
          [[registry]]
          location = "${GITLABCI_EPHEMERAL_REGISTRY_URL}"
          insecure = true
      __EOF
      fi
    - podman login ${CI_REGISTRY} --username ${CI_REGISTRY_USER}
                                  --password ${CI_REGISTRY_PASSWORD}

# ----------------------------------------------------------------------------
# Builds and saves the OCI image for this project
.build-image:
  stage: build
  before_script:
    - !reference ['.configure-registries', 'script']
  script:
    - mkdir -p ./.build/images
    - export PUSH_REGISTRY_CLI_ARG=
    - export TARGET_CLI_ARG=
    - export OUTPUT_DIR_CLI_ARG="--output-dir ./.build/images"
    - |
      if [[ -n "${GITLABCI_EPHEMERAL_REGISTRY_URL}" ]];  then
        export PUSH_REGISTRY_CLI_ARG="--push-registry ${GITLABCI_EPHEMERAL_REGISTRY_URL}"
      fi
    - |
      if [[ -n "${GITLABCI_IMAGE_BUILD_TARGET}" ]]; then
        TARGET_CLI_ARG="--target ${GITLABCI_IMAGE_BUILD_TARGET}"
      fi
    - |
      gitlab-ci image build   ${PUSH_REGISTRY_CLI_ARG} \
                              ${TARGET_CLI_ARG} \
                              ${OUTPUT_DIR_CLI_ARG}
  needs: []
  artifacts:
    paths:
      - ./.build/images
    expire_in: 1 week


# ----------------------------------------------------------------------------
# Unit tests this project
.unittest-image:
  stage: test
  before_script:
    - !reference ['.configure-registries', 'script']
  script:
    - mkdir -p ./.build/test-results
    - export TEST_IMAGE_NAME=$(gitlab-ci image build --target test --name-only)
    - gitlab-ci image build  --target test
    - podman run  --rm
                  --interactive
                  --tty
                  --volume ./.build/test-results:/var/tmp
                  ${TEST_IMAGE_NAME}
  rules:
    - if: $GITLABCI_IMAGE_UNITTESTS =~ /false/
      when: never
  needs: []
  artifacts:
    paths:
      - ./.build/test-results/unit-tests.xml
    reports:
      junit: ./.build/test-results/unit-tests.xml
    expire_in: 1 week


# ----------------------------------------------------------------------------
# Pushes this project's image(s) to the container registry
.push-image:
  stage: publish
  before_script:
    - !reference ['.configure-registries', 'script']
  script:
    - gitlab-ci image push ./.build/images/*.yaml
  needs:
    - build-image
    - job: unittest
      optional: true
  rules:
    - if: $CI_COMMIT_REF_PROTECTED =~ /true/
    - if: $GITLABCI_PUSH_IMAGE_FORCE =~ /true/
