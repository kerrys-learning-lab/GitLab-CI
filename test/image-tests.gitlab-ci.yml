include:
  - local: jobs/.image.gitlab-ci.yml
  - local: test/utility.gitlab-ci.yml


# ----------------------------------------------------------------------------
oci image settings (basic - release tag):
  extends: .oci-image-test-case
  variables:
    CI_COMMIT_REF_SLUG: 1.2.3
  script:
    - |
      declare -A EXPECTED_VALUES
      EXPECTED_VALUES[IMAGE_AS_BUILT_FULL_NAME]=${CI_REGISTRY_IMAGE}
      EXPECTED_VALUES[IMAGE_AS_BUILT_VERSION]=build.${CI_PIPELINE_IID}

      EXPECTED_PODMAN_CLI_CONTEXT=.

      declare -A EXPECTED_PODMAN_CLI_ARGS
      EXPECTED_PODMAN_CLI_ARGS[--label]="org.opencontainers.image.version=1.2.3"
      EXPECTED_PODMAN_CLI_ARGS[--tag]=${CI_REGISTRY_IMAGE}:build.${CI_PIPELINE_IID}
    - !reference [.image-build,                             before_script]
    - !reference [.oci-image-test-case//assert-podman-cli,  script]


