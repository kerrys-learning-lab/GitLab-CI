# ----------------------------------------------------------------------------
image build test:
  extends: .oci-image-test-case
  variables:
    CI_COMMIT_REF_SLUG: 1.2.3
    IMAGE_BUILD_CONTEXT: examples/simple-image
    IMAGE_BUILD_ARG_FLOBBER: blam
    IMAGE_BUILD_SECRET_STRING_FOO_PASSWORD: foo-is-the-password
    IMAGE_BUILD_NAME: gitlab-ci/examples/simple-image
  script:
    - !reference [.image-build, before_script]
    - !reference [.image-build, script]
    - podman image pull --quiet ${IMAGE_AS_BUILT_URI}
  needs:
    - oci image settings (basic - release tag)
    - oci image settings (basic - release branch)
    - oci image settings (basic - main branch)
    - oci image settings (basic - developer branch)
    - oci image settings (custom context)
    - oci image settings (custom Dockerfile)
    - oci image settings (custom all)
    - oci image settings (build args)
    - oci image settings (build secrets)


# ----------------------------------------------------------------------------
image unit-test test:
  extends: .oci-image-test-case
  variables:
    IMAGE_BUILD_CONTEXT: examples/simple-image
    IMAGE_BUILD_DOCKERFILE: examples/simple-image/Dockerfile
    IMAGE_BUILD_TARGET: unittest
    IMAGE_BUILD_ARG_FLOBBER: blam
    IMAGE_BUILD_SECRET_STRING_FOO_PASSWORD: foo-is-the-password
    IMAGE_UNITTEST_CONTAINER_OUTPUT_FILE: test-results.xml
    IMAGE_UNITTEST_LOCAL_OUTPUT_DIR: .image-unit-test
    IMAGE_UNITTEST_LOCAL_FILE: unit-test-results.${CI_JOB_ID}.xml
  script:
    - !reference [.image-build,     before_script]
    - !reference [.image-unit-test,  script]


# ----------------------------------------------------------------------------
image promote test:
  extends: .oci-image-test-case
  variables:
    IMAGE_BUILD_NAME: gitlab-ci/examples/simple-image
    IMAGE_PROMOTE_RELEASE_TRAIN: false
    IMAGE_PROMOTE_SEMANTIC_VERSION: false
  script:
    - !reference [.image-base,    before_script]
    - !reference [.image-promote, script]
  needs:
    - image build test


# ----------------------------------------------------------------------------
.oci-image-test-case:
  extends: .test-case
  rules:
    - if: $OCI_IMAGE_TESTS_DISABLED == true
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: never
    - when: on_success


# ----------------------------------------------------------------------------
.oci-image-test-case//assert-podman-cli:
  script:
    - |
      ACTUAL_PODMAN_CLI_CONTEXT=${IMAGE_BUILD_CLI_ARGS[-1]}
      if [[ -n "${EXPECTED_PODMAN_CLI_CONTEXT}" && "${EXPECTED_PODMAN_CLI_CONTEXT}" != "${ACTUAL_PODMAN_CLI_CONTEXT}" ]]; then
        echo "❌  Assertion failed in job: '${CI_JOB_NAME}'"
        echo "    Expected context: ${EXPECTED_PODMAN_CLI_CONTEXT}"
        echo "    Actual context:   ${ACTUAL_PODMAN_CLI_CONTEXT}"
        exit 100
      fi

    - |
      for expected_key in "${!EXPECTED_PODMAN_CLI_ARGS[@]}"; do
        expected_value="${EXPECTED_PODMAN_CLI_ARGS[${expected_key}]}"

        # The syntax below creates a copy of the list
        cli_args_copy=("${IMAGE_BUILD_CLI_ARGS[@]}")
        found_key=
        found_value=
        candidates=()
        while (( ${#cli_args_copy[@]} )); do
          actual_key="${cli_args_copy[0]}"
          actual_value="${cli_args_copy[1]}"

          if [[ "${actual_key}" == "${expected_key}" ]]; then
            found_key="${actual_key}"

            if [[ "${actual_value}" == "${expected_value}" ]]; then
              found_value="${actual_value}"
              break
            else
              candidates+=("${actual_value}")
            fi
          fi

          cli_args_copy=("${cli_args_copy[@]:1}")
        done

        if [[ -z "${found_key}" ]]; then
            echo "❌  Assertion failed in job: '${CI_JOB_NAME}'"
            echo "    Expected: ${expected_key} '${expected_value}'"
            echo "    Actual:   Key not found"
            exit 100
        elif [[ -z "${found_value}" ]]; then
            echo "❌  Assertion failed in job: '${CI_JOB_NAME}'"
            echo "    Expected: ${expected_key} '${expected_value}'"
            echo "    Actual:   ${found_key} '${candidates[*]}'"
            exit 100
        fi
      done
