include:
  - local: jobs/.helm.gitlab-ci.yml
  - local: test/utility.gitlab-ci.yml


# ----------------------------------------------------------------------------
helm package test:
  extends: .test-case
  variables:
    HELM_CHART_DIR: examples/helm-chart
    HELM_UNITTEST_FILE_GLOB: 'tests/*.tests.yaml'
  script:
    - !reference [.helm-base,     before_script]
    - !reference [.helm-package,  script]
  artifacts:
    paths:
      - .helm-package
    when: always
    expire_in: 1 week


# ----------------------------------------------------------------------------
helm unit-test test:
  extends: .test-case
  variables:
    HELM_CHART_DIR: examples/helm-chart
  script:
    - !reference [.helm-base,       before_script]
    - !reference [.helm-unit-test,  script]
  needs:
    - helm package test


# ----------------------------------------------------------------------------
helm push test:
  extends: .test-case
  variables:
    HELM_CHART_DIR: examples/helm-chart
  script:
    - set -x
    - !reference [.helm-base,   before_script]
    - !reference [.helm-push,   script]
  needs:
    - helm package test
    - helm unit-test test
