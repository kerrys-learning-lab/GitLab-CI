---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitlab-runner-test
spec:
  selector:
    matchLabels:
      name: gitlab-runner-test
  template:
    metadata:
      labels:
        name: gitlab-runner-test
    spec:
      containers:
        - name: gitlab-runner-test
          image: {{ printf "%s/%s:%s" .Values.image.repo .Values.image.name .Values.image.version }}
          imagePullPolicy: Always
          env:
            - name: PYTHONPATH
              value: /workspace/src:/workspace/test
            - name: PATH
              value: /workspace/src:/root/.local/bin:/root/bin:/usr/local/bin:/usr/bin
            {{- range $key, $value := .Values.env | default dict }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          command:
            - /bin/bash
            - -c
          args:
            - while true; do sleep 10; done
          workingDir: /workspace
          securityContext:
            privileged: true
          volumeMounts:
            - name: auto-config-map
              mountPath: /etc/containers/registries.conf.d/ephemeral-registry.conf
              subPath: containers--registries.conf.d--ephemeral-registry.conf
            - name: live-code
              mountPath: /opt/gitlab-ci
              subPath: devsecops/gitlab-ci/src
            {{- range $path := .Values.live_code.paths | default list }}
            - name: live-code
              mountPath: /workspace/{{ $path }}
              subPath: devsecops/gitlab-ci/{{ $path }}
              readonly: true
            {{- end }}
      imagePullSecrets:
        - name: gitlab-image-pull
      volumes:
        - name: auto-config-map
          configMap:
            name: gitlab-runner-auto-config-map
        - name: live-code
          hostPath:
            path: /home/kerry/dev/kerrys-learning-lab
