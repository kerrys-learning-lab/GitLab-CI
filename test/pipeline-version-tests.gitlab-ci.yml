include:
  - local: jobs/.pipeline-version.gitlab-ci.yml
  - local: test/utility.gitlab-ci.yml


variables:
  PIPELINE_VERSION_SKIP_SAVE_TO_FILE: true


# ----------------------------------------------------------------------------
pipeline version release tag:
  extends: .pipeline-test-case//base
  variables:
    CI_COMMIT_TAG: v1.2.3
    CI_COMMIT_REF_PROTECTED: true
    CI_PIPELINE_IID: 42
  script:
    - |
      declare -A EXPECTED_VALUES
      EXPECTED_VALUES[RELEASE_TRAIN]=1.2
      EXPECTED_VALUES[SEMANTIC_VERSION]=1.2.3
      EXPECTED_VALUES[SEMANTIC_VERSION_MAJOR]=1
      EXPECTED_VALUES[SEMANTIC_VERSION_MINOR]=2
      EXPECTED_VALUES[SEMANTIC_VERSION_PATCH]=3

    - !reference [.pipeline-version, script]


# ----------------------------------------------------------------------------
pipeline version release branch:
  extends: .pipeline-test-case//base
  variables:
    CI_COMMIT_BRANCH: release/1.2
    CI_COMMIT_REF_PROTECTED: true
    CI_PIPELINE_IID: 42
  script:
    - |
      declare -A EXPECTED_VALUES
      EXPECTED_VALUES[RELEASE_TRAIN]=1.2
      EXPECTED_VALUES[SEMANTIC_VERSION]=1.2.0-rc+42
      EXPECTED_VALUES[SEMANTIC_VERSION_MAJOR]=1
      EXPECTED_VALUES[SEMANTIC_VERSION_MINOR]=2
      EXPECTED_VALUES[SEMANTIC_VERSION_PATCH]=0

    - !reference [.pipeline-version, script]


# ----------------------------------------------------------------------------
pipeline version default branch:
  extends: .pipeline-test-case//base
  variables:
    CI_COMMIT_BRANCH: main
    CI_COMMIT_REF_PROTECTED: true
    CI_PIPELINE_IID: 42
  script:
    - |
      declare -A EXPECTED_VALUES
      EXPECTED_VALUES[RELEASE_TRAIN]=main
      EXPECTED_VALUES[SEMANTIC_VERSION]=0.0.0-main+42
      EXPECTED_VALUES[SEMANTIC_VERSION_MAJOR]=0
      EXPECTED_VALUES[SEMANTIC_VERSION_MINOR]=0
      EXPECTED_VALUES[SEMANTIC_VERSION_PATCH]=0

    - !reference [.pipeline-version, script]


# ----------------------------------------------------------------------------
pipeline version developer branch:
  extends: .pipeline-test-case//base
  variables:
    CI_COMMIT_BRANCH: feat/77-this-is-my-branch
    CI_COMMIT_REF_PROTECTED: false
    CI_PIPELINE_IID: 42
  script:
    - |
      declare -A EXPECTED_VALUES
      EXPECTED_VALUES[RELEASE_TRAIN]=
      EXPECTED_VALUES[SEMANTIC_VERSION]=0.0.0-feat-77-this-is-my-branch+42
      EXPECTED_VALUES[SEMANTIC_VERSION_MAJOR]=0
      EXPECTED_VALUES[SEMANTIC_VERSION_MINOR]=0
      EXPECTED_VALUES[SEMANTIC_VERSION_PATCH]=0

    - !reference [.pipeline-version, script]


# ----------------------------------------------------------------------------
.pipeline-test-case//base:
  extends: .test-case
  before_script:
    - |
      if [[ -n "${CI_COMMIT_TAG}" ]]; then
        CI_COMMIT_REF_NAME=${CI_COMMIT_TAG}
        CI_COMMIT_BRANCH=
      elif [[ -n "${CI_COMMIT_BRANCH}" ]]; then
        CI_COMMIT_REF_NAME=${CI_COMMIT_BRANCH}
      else
        echo "ERROR:  One of CI_COMMIT_TAG or CI_COMMIT_BRANCH must be defined"
        exit -1
      fi

      CI_COMMIT_REF_SLUG=${CI_COMMIT_REF_NAME//\//-}
      CI_COMMIT_REF_SLUG=${CI_COMMIT_REF_SLUG,,}
      CI_DEFAULT_BRANCH=main

    - !reference [.test-case//setup,  before_script]
  rules:
    - if: $PIPELINE_VERSION_TESTS_DISABLED == true
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: never
    - when: on_success
