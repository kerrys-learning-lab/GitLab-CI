.test-case//setup:
  before_script:
    - |
      test_case_assert() {
        local original_status=$?

        if [[ -n "${EXPECT_FAILURE}" && ${original_status} -eq 0 ]]; then
          echo "❌  Assertion failed in job: '${CI_JOB_NAME}'"
          echo "    Expected: Failure (non-zero exit code)"
          echo "    Actual:   No failure detected"
          exit 100
        elif [[ -z "${EXPECT_FAILURE}" && ${original_status} -ne 0 ]]; then
          echo "❌  Assertion failed in job: '${CI_JOB_NAME}'"
          echo "    Expected: Success (zero exit code)"
          echo "    Actual:   Failure detected"
          exit 100
        fi

        if [[ -n "${EXPECTED_VALUES[@]}" ]]; then
          for key in ${!EXPECTED_VALUES[@]}; do
            if [[ "${!key}" != "${EXPECTED_VALUES[$key]}" ]]; then
              echo "❌  Assertion failed in job: '${CI_JOB_NAME}'"
              echo "    Expected: ${key}=${EXPECTED_VALUES[$key]}"
              echo "    Actual:   ${!key}"
              exit 100
            fi
          done
        fi

        exit 0
      }

      trap  test_case_assert  EXIT

.test-case:
  stage: test
  before_script:
    - !reference [.test-case//setup,  before_script]
