# Repo-management files that must not ship inside the built collection tarball.
build_ignore:
  - .git
  - .gitlab-ci.yml
  - .gitleaks.toml
  - .pre-commit-config.yaml
  - .ansible-lint.yml
  - ansible.cfg
  - renovate.json
  - artifacts
  - .gitlab-ci-local
  - "*.tar.gz"
