# ============================================================================
spec:
  inputs:


    # ------------------------------------------------------------------------
    downstream_project_name:
      description: The full name and namespace of the downstream project to
                   be triggered
      type: string
    downstream_project_ref:
      description: The ref (branch, tag) of the downstream project Pipeline
                   to be triggered
      type: string
      default: main


    # ------------------------------------------------------------------------
    trigger_stage:
      description: Assigns the Pipeline stage for the 'trigger' Job
      type: string
      default: deploy


    # ------------------------------------------------------------------------
    # These settings affect Job names for all Jobs instantiated by the component
    jobs_name_prefix:
      description: Optional prefix for the Job names
      type: string
      default: ''
    jobs_name_suffix:
      description: Optional suffix for the Job names
      type: string
      default: ''


  # --------------------------------------------------------------------------
  # Propagate component metadata
  component:
    - name
    - version
    - reference

---

# ============================================================================
include:
  - local: .gitlab-ci/lib/stages.gitlab-ci.yml


# ----------------------------------------------------------------------------
"$[[ inputs.jobs_name_prefix ]]trigger downstream$[[ inputs.jobs_name_suffix ]]":
  stage: $[[ inputs.trigger_stage ]]
  trigger:
    project: $[[ inputs.downstream_project_name ]]
    branch: $[[ inputs.downstream_project_ref ]]
    strategy: mirror
