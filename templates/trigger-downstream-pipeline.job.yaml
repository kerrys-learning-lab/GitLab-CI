# ============================================================================
spec:
  inputs:


    # ------------------------------------------------------------------------
    downstream_project_name:
      description: The full name and namespace of the downstream project to
                   be triggered
      type: string


    # ------------------------------------------------------------------------
    # These settings affect Job names for all Jobs instantiated by the component
    jobs_name_prefix:
      description: Optional prefix for the Job names
      type: string
      default: ''
    jobs_name_suffix:
      description: Optional suffix for the Job names
      type: string
      default: ''


  # --------------------------------------------------------------------------
  # Propagate component metadata
  component:
    - name
    - version
    - reference

---

# ============================================================================
include:
  - local: .gitlab-ci/lib/stages.gitlab-ci.yml


# ----------------------------------------------------------------------------
"$[[ inputs.jobs_name_prefix ]]trigger downstream$[[ inputs.jobs_name_suffix ]]":
  stage: trigger
  before_script:
    - git config --global user.email ${GITLAB_CICD_BOT_EMAIL}
    - git config --global user.name "${GITLAB_CICD_BOT_NAME}"
    - git clone https://gitlab-cicd-bot:${GITLAB_CICD_BOT_TOKEN}@${CI_SERVER_HOST}/${DOWNSTREAM_PROJECT_GROUP}/${DOWNSTREAM_PROJECT_NAME}.git
    - cd ${CI_PROJECT_DIR}/${DOWNSTREAM_PROJECT_NAME}
    - |
        if [[ -n "${DOWNSTREAM_COMMIT_BRANCH}" ]]; then
            git switch     ${DOWNSTREAM_COMMIT_BRANCH} 2> /dev/null || \
            git switch -c  ${DOWNSTREAM_COMMIT_BRANCH}
        elif [[ -n "${CI_COMMIT_BRANCH}" ]]; then
            git switch     ${CI_COMMIT_BRANCH} 2> /dev/null || \
            git switch -c  ${CI_COMMIT_BRANCH}
        fi
  after_script:
    - cd ${CI_PROJECT_DIR}/${DOWNSTREAM_PROJECT_NAME}
    - |
        touch GENERATED.md
        mv GENERATED.md GENERATED.old.md
        cat << EOF > GENERATED.md
        ### ${CI_COMMIT_REF_NAME} - ${CI_PIPELINE_CREATED_AT}

        Generated by:
        [${CI_PROJECT_NAME} Pipeline ${CI_PIPELINE_IID}](${CI_PIPELINE_URL})

        ${CI_COMMIT_MESSAGE}

        EOF
        cat GENERATED.old.md >> GENERATED.md
        rm -f GENERATED.old.md
        git add GENERATED.md
    - |
        git commit -m "Generated automatically by upstream pipeline: ${CI_PIPELINE_URL:-'N/A'}"
    - |
        if [[ -n "${CI_COMMIT_TAG}" ]]; then
            git tag -a ${CI_COMMIT_TAG} -m "${CI_COMMIT_MESSAGE}"
        fi
    - |
        git push origin ${CI_COMMIT_REF_NAME}
rules:
    - if: $CI_COMMIT_REF_PROTECTED =~ /true/
    - if: $GITLABCI_APPLY_DOWNSTREAM_PROJECT_FORCE =~ /true/
