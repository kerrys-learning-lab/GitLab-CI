# ============================================================================
spec:
  inputs:
    # ------------------------------------------------------------------------
    # These settings affect the image artifact
    image_name:
      description: The short name of the image, relative to the Project
                   fully qualified path (<group-namespace>/<project>).
      type: string
      default: ''


    # ------------------------------------------------------------------------
    # These settings affect the building of the image
    image_build_dockerfile:
      description: Relative path to the Dockerfile used to build the image
                   (default is "Dockerfile")
      type: string
      default: Dockerfile
    image_build_context:
      description: Relative path to the image build context (default is the
                   root directory of the project)
      type: string
      default: .
    image_build_target:
      description: The image build target, if applicable
      type: string
      default: ''
    image_build_ignorefile:
      description: The relative path to the ignorefile, if applicable
      type: string
      default: .dockerignore
    image_build_base_image_name:
      description: Set to the base image's short-name *if this image is
                   derived from a base image produced by this same Pipeline.
                   The base image produced by this Pipeline will be injected
                   into the child image's build process as the BASE_IMAGE build-arg.

                   NOTE - Be sure and set this Job's 'image_build_needs' to
                          the name of the Job which builds the base image!
      type: string
      default: ''
    image_build_stage:
      description: Assigns the Pipeline stage for the 'image build' Job
      type: string
      default: build
    image_build_needs:
      description: DAG specification for the 'image build' Job
      type: array
      default:
        - pipeline version


    # ------------------------------------------------------------------------
    # These settings affect the unit testing of the image
    #
    # NOTE: Right now, there is an assumption that the 'unit-test' target uses
    #       the same Dockerfile, ignorefile, and context as the default
    #       build target.  This may need to be revisited.
    image_unit_test_enabled:
      description: If true, the image will be unit tested
      type: boolean
      default: true
    image_unit_test_target:
      description: If not empty, the image will be unit tested by building and
                   executing the corresponding target
      type: string
      default: unittest
    image_unit_test_container_output_dir:
      description: The directory at which the image's unit test will write the
                   the result xUnit file *within the running container*.
                   This Job will mount an empty directory at this location in
                   order to receive the file.
      type: string
      default: /var/tmp
    image_unit_test_results_filename:
      description: The filename (relative to 'image_unit_test_container_output_dir') to
                   which the unit test results will be written.  The Job will
                   capture this file as a JUnit artifact.
      type: string
      default: unit-test-results.xml
    image_unit_test_stage:
      description: Assigns the Pipeline stage for the 'image unit-test' Job
      type: string
      default: test


    # ------------------------------------------------------------------------
    # These settings affect the structure testing of the image
    image_structure_test_enabled:
      description: If true, the image will be structure tested
      type: boolean
      default: true
    image_structure_test_filenames:
      description: If not empty, the image will be unit tested by building and
                   executing the corresponding target
      type: string
      default: test/image-structure-test.yaml
    image_structure_test_stage:
      description: Assigns the Pipeline stage for the 'image structure-test' Job
      type: string
      default: test


    # ------------------------------------------------------------------------
    # These settings affect the promoted image
    image_promote_release_train:
      description: If true, tag and push the Release Train version (only
                   applicable if the commit has a corresponding Release Train)
      type: boolean
      default: true
    image_promote_semantic_version:
      description: If true, tag and push the Semantic Version for the image
      type: boolean
      default: true
    image_promote_stage:
      description: Assigns the Pipeline stage for the 'image push' Job
      type: string
      default: publish
    image_promote_option:
      description: By default, only protected refs are pushed to the container
                   registry.  Specifying 'force' will push the image for
                   non-protected refs.  Specifying 'skip' will not push
                   protected refs.
      type: string
      options:
        - protected
        - skip
        - force
      default: protected


    # ------------------------------------------------------------------------
    image_release_stage:
      description: Assigns the Pipeline stage for the 'image release' Job
      type: string
      default: release
    image_release_enabled:
      description: If true, and this Pipeline is for a protected tag, a
                   Release will be created.

                   NOTE -  Only one Job in a Pipeline should create a Release.
      type: boolean
      default: true


    # ------------------------------------------------------------------------
    # These settings affect Job names for all Jobs instantiated by the component
    jobs_name_prefix:
      description: Optional prefix for the Job names
      type: string
      default: ''
    jobs_name_suffix:
      description: Optional suffix for the Job names
      type: string
      default: ''


  # --------------------------------------------------------------------------
  # Propagate component metadata
  component:
    - name
    - version
    - reference

---

# ============================================================================
include:
  - local: jobs/.defaults.gitlab-ci.yml
  - local: jobs/.image.gitlab-ci.yml
  - local: jobs/.release.gitlab-ci.yml
  - local: lib/utilities.gitlab-ci.yml
  - local: lib/rules.gitlab-ci.yml
  - local: templates/pipeline-version.gitlab-ci.yml


# ============================================================================
"$[[ inputs.jobs_name_prefix ]]image build$[[ inputs.jobs_name_suffix ]]":
  extends: .image-build
  stage: $[[ inputs.image_build_stage ]]
  variables:
    IMAGE_BUILD_NAME: $[[ inputs.image_name ]]
    IMAGE_BUILD_DOCKERFILE: $[[ inputs.image_build_dockerfile ]]
    IMAGE_BUILD_CONTEXT:  $[[ inputs.image_build_context ]]
    IMAGE_BUILD_IGNOREFILE: $[[ inputs.image_build_ignorefile ]]
    IMAGE_BUILD_TARGET:  $[[ inputs.image_build_target ]]
    IMAGE_BUILD_BASE_IMAGE_NAME: $[[ inputs.image_build_base_image_name ]]
  needs: $[[ inputs.image_build_needs ]]
  rules:
    - !reference [.rules//not-a-merge-request,  rules]
    - when: on_success


# ============================================================================
"$[[ inputs.jobs_name_prefix ]]image unit-test$[[ inputs.jobs_name_suffix ]]":
  extends: .image-unit-test
  stage: $[[ inputs.image_unit_test_stage ]]
  variables:
    IMAGE_BUILD_NAME: $[[ inputs.image_name ]]
    IMAGE_BUILD_DOCKERFILE: $[[ inputs.image_build_dockerfile ]]
    IMAGE_BUILD_CONTEXT:  $[[ inputs.image_build_context ]]
    IMAGE_BUILD_IGNOREFILE: $[[ inputs.image_build_ignorefile ]]
    IMAGE_BUILD_TARGET:  $[[ inputs.image_unit_test_target ]]
    IMAGE_UNITTEST_CONTAINER_OUTPUT_DIR: $[[ inputs.image_unit_test_container_output_dir ]]
    IMAGE_UNITTEST_CONTAINER_OUTPUT_FILE: $[[ inputs.image_unit_test_results_filename ]]
  rules:
    - !reference [.rules//not-a-merge-request,  rules]
    - if: "'$[[ inputs.image_unit_test_enabled ]]' == 'false'"
      when: never
    - when: on_success


# ============================================================================
"$[[ inputs.jobs_name_prefix ]]image structure-test$[[ inputs.jobs_name_suffix ]]":
  extends: .image-structure-test
  stage: $[[ inputs.image_structure_test_stage ]]
  variables:
    IMAGE_BUILD_NAME: $[[ inputs.image_name ]]
    IMAGE_STRUCTURE_TEST_FILENAMES: "$[[ inputs.image_structure_test_filenames ]]"
  rules:
    - !reference [.rules//not-a-merge-request,  rules]
    - if: "'$[[ inputs.image_structure_test_enabled ]]' == 'false'"
      when: never
    - when: on_success


# ============================================================================
"$[[ inputs.jobs_name_prefix ]]image promote$[[ inputs.jobs_name_suffix ]]":
  extends: .image-promote
  stage: $[[ inputs.image_promote_stage ]]
  variables:
    IMAGE_BUILD_NAME: $[[ inputs.image_name ]]
    IMAGE_PROMOTE_RELEASE_TRAIN: $[[ inputs.image_promote_release_train ]]
    IMAGE_PROMOTE_SEMANTIC_VERSION: $[[ inputs.image_promote_semantic_version ]]
  rules:
    - !reference [.rules//not-a-merge-request,  rules]
    - if: "'$[[ inputs.image_promote_option ]]' == 'skip'"
      when: never
    - if: "'$[[ inputs.image_promote_option ]]' == 'force'"
    - !reference [.rules//protected-ref,        rules]


# ============================================================================
"$[[ inputs.jobs_name_prefix ]]image release$[[ inputs.jobs_name_suffix ]]":
  extends: .release
  stage: $[[ inputs.image_release_stage ]]
  rules:
    - if: "'$[[ inputs.image_release_enabled ]]' == 'false'"
      when: never
    - !reference [.rules//not-a-merge-request,  rules]
    - !reference [.rules//protected-tag,        rules]
