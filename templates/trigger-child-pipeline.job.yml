# ============================================================================
spec:
  inputs:


    # ------------------------------------------------------------------------
    local_path:
      description: The relative path to the child Pipeline to be triggered
      type: string


    # ------------------------------------------------------------------------
    trigger_stage:
      description: Assigns the Pipeline stage for the 'trigger' Job
      type: string
      default: deploy


    # ------------------------------------------------------------------------
    # These settings affect Job names for all Jobs instantiated by the component
    jobs_name_prefix:
      description: Optional prefix for the Job names
      type: string
      default: ''
    jobs_name_suffix:
      description: Optional suffix for the Job names
      type: string
      default: ''


  # --------------------------------------------------------------------------
  # Propagate component metadata
  component:
    - name
    - version
    - reference

---

# ============================================================================
include:
  - local: .gitlab-ci/rules.gitlab-ci.yml
  - local: .gitlab-ci/stages.gitlab-ci.yml


# ----------------------------------------------------------------------------
"$[[ inputs.jobs_name_prefix ]]trigger child$[[ inputs.jobs_name_suffix ]]":
  stage: $[[ inputs.trigger_stage ]]
  trigger:
    include:
      - local: $[[ inputs.local_path ]]
    strategy: mirror
