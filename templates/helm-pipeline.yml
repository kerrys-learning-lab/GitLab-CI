# ============================================================================
spec:
  inputs:
    # ------------------------------------------------------------------------
    helm-chart-dir:
      description: Relative path to the chart contents (folder which contains
                   Chart.yaml)
      type: string
      default: .
    helm-package-stage:
      description: Assigns the Pipeline stage for the 'helm package' Job
      type: string
      default: build
    helm-package-needs:
      description: DAG specification for the 'helm package' Job
      type: array
      default: []


    # ------------------------------------------------------------------------
    # These settings affect the unit testing of the Helm chart
    helm-unit-test-enabled:
      description: If true, the Helm chart will be unit tested
      type: boolean
      default: true
    helm-unit-test-chart-dir:
      description: Relative path to the chart contents to be tested (folder
                   which contains Chart.yaml).

                   Generally speaking, this will be the same value as for
                   'helm-chart-dir'.  However, when testing library
                   charts, this will usually be a different Chart directory
                   which exists specifically to use the library Chart.
      type: string
      default: .
    helm-unit-test-file-glob:
      description: Test files glob pattern relative to 'helm-unit-test-chart-dir'
      type: string
      default: tests/*.tests.yaml
    helm-unit-test-stage:
      description: Assigns the Pipeline stage for the 'helm unit-test' Job
      type: string
      default: test


    # ------------------------------------------------------------------------
    # These settings affect the pushed Chart
    helm-push-repo-url:
      description: The destination Chart repository URL.  If not specified,
                   will default the 'stable' channel of this GitLab Project's
                   Chart repository
      type: string
      default: ''
    helm-push-repo-username:
      description: The auth username of the destination Chart repository URL.
                   If not specified, will default to the CI_JOB_TOKEN
      type: string
      default: ''
    helm-push-repo-password:
      description: The auth password of the destination Chart repository URL.
                   If not specified, will default to the CI_JOB_TOKEN
      type: string
      default: ''
    helm-push-stage:
      description: Assigns the Pipeline stage for the 'helm push' Job
      type: string
      default: publish
    helm-push-option:
      description: By default, only protected refs are pushed to the Helm
                   Chart repository.  Specifying 'force' will push the Chart for
                   non-protected refs.  Specifying 'skip' will not push
                   protected refs.
      type: string
      options:
        - protected
        - skip
        - force
      default: protected


    # ------------------------------------------------------------------------
    # These settings affect Job names for all Jobs instantiated by the component
    jobs-prefix:
      description: Optional prefix for the Job names
      type: string
      default: ''
    jobs-suffix:
      description: Optional suffix for the Job names
      type: string
      default: ''


  # --------------------------------------------------------------------------
  # Propagate component metadata
  component:
    - name
    - version
    - reference

---

# ============================================================================
workflow:
  name: Helm Chart


# ----------------------------------------------------------------------------
"$[[ inputs.jobs-prefix ]]helm package$[[ inputs.jobs-suffix ]]":
  extends: .helm-package
  stage: $[[ inputs.helm-package-stage ]]
  variables:
    HELM_CHART_DIR:  $[[ inputs.helm-chart-dir ]]
  artifacts:
    paths:
      - .helm-package
    when: always
    expire_in: 1 week
  needs: $[[ inputs.helm-package-needs ]]


# ----------------------------------------------------------------------------
"$[[ inputs.jobs-prefix ]]helm unit-test$[[ inputs.jobs-suffix ]]":
  extends: .helm-unit-test
  stage: $[[ inputs.helm-unit-test-stage ]]
  variables:
    HELM_CHART_DIR:  $[[ inputs.helm-unit-test-chart-dir ]]
    HELM_UNITTEST_FILE_GLOB: $[[ inputs.helm-unit-test-file-glob ]]
  rules:
    - if: "'$[[ inputs.helm-unit-test-enabled ]]' == 'false'"
      when: never
    - if: "'$[[ inputs.helm-unit-test-enabled ]]' == 'true'"
  artifacts:
    paths:
      - .helm-unit-test
    reports:
      junit: .helm-unit-test/unit-test-results.${CI_JOB_ID}.xml
    when: always
    expire_in: 1 week


# ----------------------------------------------------------------------------
"$[[ inputs.jobs-prefix ]]helm push$[[ inputs.jobs-suffix ]]":
  extends: .helm-push
  stage: $[[ inputs.helm-push-stage ]]
  variables:
    HELM_CHART_DIR:  $[[ inputs.helm-chart-dir ]]
    HELM_REPO_PIPELINE_PUSH_URL: $[[ inputs.helm-push-repo-url ]]
    HELM_REPO_PIPELINE_PUSH_USERNAME: $[[ inputs.helm-push-repo-username ]]
    HELM_REPO_PIPELINE_PUSH_PASSWORD: $[[ inputs.helm-push-repo-password ]]
  rules:
    - if: "'$[[ inputs.helm-push-option ]]' == 'skip'"
      when: never
    - if: "'$[[ inputs.helm-push-option ]]' == 'force'"
    - if: "'$CI_COMMIT_REF_PROTECTED' == 'true'"
