# ============================================================================
spec:
  inputs:
    # ------------------------------------------------------------------------
    helm_chart_dir:
      description: Relative path to the chart contents (folder which contains
                   Chart.yaml)
      type: string
      default: .
    helm_package_stage:
      description: Assigns the Pipeline stage for the 'helm package' Job
      type: string
      default: build
    helm_package_needs:
      description: DAG specification for the 'helm package' Job
      type: array
      default:
        - pipeline version


    # ------------------------------------------------------------------------
    # These settings affect the unit testing of the Helm chart
    helm_unit_test_enabled:
      description: If true, the Helm chart will be unit tested
      type: boolean
      default: true
    helm_unit_test_chart_dir:
      description: Relative path to the chart contents to be tested (folder
                   which contains Chart.yaml).

                   Generally speaking, this will be the same value as for
                   'helm_chart_dir'.  However, when testing library
                   charts, this will usually be a different Chart directory
                   which exists specifically to use the library Chart.
      type: string
      default: .
    helm_unit_test_file_glob:
      description: Test files glob pattern relative to 'helm_unit_test_chart_dir'
      type: string
      default: tests/*.tests.yaml
    helm_unit_test_stage:
      description: Assigns the Pipeline stage for the 'helm unit-test' Job
      type: string
      default: test


    # ------------------------------------------------------------------------
    # These settings affect the pushed Chart
    helm_push_repo_url:
      description: The destination Chart repository URL.  If not specified,
                   will default the 'stable' channel of this GitLab Project's
                   Chart repository
      type: string
      default: ''
    helm_push_repo_username:
      description: The auth username of the destination Chart repository URL.
                   If not specified, will default to the CI_JOB_TOKEN
      type: string
      default: ''
    helm_push_repo_password:
      description: The auth password of the destination Chart repository URL.
                   If not specified, will default to the CI_JOB_TOKEN
      type: string
      default: ''
    helm_push_stage:
      description: Assigns the Pipeline stage for the 'helm push' Job
      type: string
      default: publish
    helm_push_option:
      description: By default, only protected refs are pushed to the Helm
                   Chart repository.  Specifying 'force' will push the Chart for
                   non-protected refs.  Specifying 'skip' will not push
                   protected refs.
      type: string
      options:
        - protected
        - skip
        - force
      default: protected


    # ------------------------------------------------------------------------
    helm_release_stage:
      description: Assigns the Pipeline stage for the 'helm release' Job
      type: string
      default: release
    helm_release_enabled:
      description: If true, and this Pipeline is for a protected tag, a
                   Release will be created.

                   NOTE -  Only one Job in a Pipeline should create a Release.
      type: boolean
      default: true


    # ------------------------------------------------------------------------
    # These settings affect Job names for all Jobs instantiated by the component
    jobs_name_prefix:
      description: Optional prefix for the Job names
      type: string
      default: ''
    jobs_name_suffix:
      description: Optional suffix for the Job names
      type: string
      default: ''


  # --------------------------------------------------------------------------
  # Propagate component metadata
  component:
    - name
    - version
    - reference


---


# ============================================================================
include:
  - local: templates/pipeline-version.job.yml
  - local: .gitlab-ci/release.gitlab-ci.yml
  - local: .gitlab-ci/helm.gitlab-ci.yml
  - local: .gitlab-ci/defaults.gitlab-ci.yml
  - local: .gitlab-ci/stages.gitlab-ci.yml
  - local: .gitlab-ci/rules.gitlab-ci.yml


# ============================================================================
workflow:
  name: Helm Chart Pipeline
  rules:
    - !reference [.rules//prevent-duplicate-pipelines,  rules]


# ============================================================================
"$[[ inputs.jobs_name_prefix ]]helm package$[[ inputs.jobs_name_suffix ]]":
  extends: .helm-package
  stage: $[[ inputs.helm_package_stage ]]
  variables:
    HELM_CHART_DIR:  $[[ inputs.helm_chart_dir ]]
  needs: $[[ inputs.helm_package_needs ]]


# ============================================================================
"$[[ inputs.jobs_name_prefix ]]helm unit-test$[[ inputs.jobs_name_suffix ]]":
  extends: .helm-unit-test
  stage: $[[ inputs.helm_unit_test_stage ]]
  variables:
    HELM_CHART_DIR:  $[[ inputs.helm_unit_test_chart_dir ]]
    HELM_UNITTEST_FILE_GLOB: $[[ inputs.helm_unit_test_file_glob ]]
  rules:
    - if: "'$[[ inputs.helm_unit_test_enabled ]]' == 'false'"
      when: never
    - when: on_success


# ============================================================================
"$[[ inputs.jobs_name_prefix ]]helm push$[[ inputs.jobs_name_suffix ]]":
  extends: .helm-push
  stage: $[[ inputs.helm_push_stage ]]
  variables:
    HELM_CHART_DIR:  $[[ inputs.helm_chart_dir ]]
    HELM_REPO_PIPELINE_PUSH_URL: $[[ inputs.helm_push_repo_url ]]
    HELM_REPO_PIPELINE_PUSH_USERNAME: $[[ inputs.helm_push_repo_username ]]
    HELM_REPO_PIPELINE_PUSH_PASSWORD: $[[ inputs.helm_push_repo_password ]]
    HELM_REPO_PIPELINE_PUSH_CHANNEL: devel
  rules:
    - if: "'$[[ inputs.helm_push_option ]]' == 'skip'"
      when: never
    - if: "'$[[ inputs.helm_push_option ]]' == 'force'"
    - !reference [.rules//only-protected-refs,        rules]


# ============================================================================
"$[[ inputs.jobs_name_prefix ]]helm release$[[ inputs.jobs_name_suffix ]]":
  extends: .release
  stage: $[[ inputs.helm_release_stage ]]
  rules:
    - if: "'$[[ inputs.helm_release_enabled ]]' == 'false'"
      when: never
    - !reference [.rules//only-protected-tags,  rules]
    - when: on_success
