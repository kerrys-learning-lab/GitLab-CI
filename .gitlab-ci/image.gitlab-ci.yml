# ============================================================================
#   - IMAGE_FULL_NAME:          The full name of the image, including
#                               the registry, group, and project but
#                               EXCLUDING the version
#   - IMAGE_AS_BUILT_VERSION:   The as-built version.  This version will
#                               be applied during the build process to
#                               identify the interim build artifact prior
#                               to "promotion" during the Publish stage
#   - IMAGE_AS_BUILT_URI:       The combination of IMAGE_FULL_NAME
#                               and IMAGE_AS_BUILT_VERSION, suitable for
#                               pushing and pulling the interim image
#                               build artifact
.image-base:
  before_script:
    - |
      # --- image-base -------------------------------------------------------

      # Default is to exit on any shell error:
      set -e


      # Authenticate to CI_REGISTRY:
      log info "Logging in to the CI_REGISTRY: ${CI_REGISTRY}..."

      podman login ${CI_REGISTRY} --username ${CI_REGISTRY_USER}  \
                                  --password ${CI_REGISTRY_PASSWORD}


      IMAGE_FULL_NAME=${CI_REGISTRY_IMAGE}

      # --- The caller may have specified a custom image name
      #     (but in all cases, it's relative to this Pipeline's Project)
      if [[ -n "${IMAGE_BUILD_NAME}" ]]; then
        IMAGE_FULL_NAME+=/${IMAGE_BUILD_NAME}
      fi

      # --- Image version
      #     (version for the *interim* build artifact.. the *actual* tag will
      #     be applied at the end of the Pipeline, if successful)
      IMAGE_AS_BUILT_VERSION=build.${CI_PIPELINE_IID}

      # --- We have the full URI now (name and version)
      IMAGE_AS_BUILT_URI=${IMAGE_FULL_NAME}:${IMAGE_AS_BUILT_VERSION}
      IMAGE_AS_BUILT_CACHE_URI=${IMAGE_FULL_NAME}-cache


# ============================================================================
.image-build:
  stage: build
  extends: .image-base
  script:
    - |
      # --- image-build ------------------------------------------------------


      # --- Parent image build-arg, if applicable:
      if [[ -n "${IMAGE_BUILD_PARENT_IMAGE_NAME}" ]]; then
        PARENT_IMAGE_AS_BUILT_FULL_NAME=${CI_REGISTRY_IMAGE}/${IMAGE_BUILD_PARENT_IMAGE_NAME}
        PARENT_IMAGE_AS_BUILT_FULL_NAME=${PARENT_IMAGE_AS_BUILT_FULL_NAME}:${IMAGE_AS_BUILT_VERSION}
        export IMAGE_BUILD_ARG_BASE_IMAGE=${PARENT_IMAGE_AS_BUILT_FULL_NAME}
      fi

      IMAGE_BUILD_CLI_ARGS=()
      IMAGE_BUILD_CLI_ARGS+=(--tag ${IMAGE_AS_BUILT_URI})

      IMAGE_BUILD_CONTEXT=${IMAGE_BUILD_CONTEXT:-.}

      # --- Dockerfile:
      IMAGE_BUILD_DOCKERFILE=${IMAGE_BUILD_DOCKERFILE:-Dockerfile}
      if [[ -f ${IMAGE_BUILD_CONTEXT}/${IMAGE_BUILD_DOCKERFILE} ]]; then
        IMAGE_BUILD_DOCKERFILE=${IMAGE_BUILD_CONTEXT}/${IMAGE_BUILD_DOCKERFILE}
      fi
      IMAGE_BUILD_CLI_ARGS+=(--file ${IMAGE_BUILD_DOCKERFILE})


      # --- Custom build target, if applicable:
      if [[ -n "${IMAGE_BUILD_TARGET}" ]]; then
        IMAGE_BUILD_CLI_ARGS+=(--target ${IMAGE_BUILD_TARGET})
      fi


      # --- Ignorefile:
      if [[ -f ${IMAGE_BUILD_CONTEXT}/${IMAGE_BUILD_IGNOREFILE} ]]; then
        IMAGE_BUILD_IGNOREFILE=${IMAGE_BUILD_CONTEXT}/${IMAGE_BUILD_IGNOREFILE}
      fi
      if [[ -f ${IMAGE_BUILD_IGNOREFILE} ]]; then
        IMAGE_BUILD_CLI_ARGS+=(--ignorefile ${IMAGE_BUILD_IGNOREFILE})
      fi


      # --- Labels:
      mapfile -d "" -t IMAGE_BUILD_LABELS < <(ci-image-labels --separator null)
      if [[ -n "${IMAGE_BUILD_LABELS[@]}" ]]; then
        IMAGE_BUILD_CLI_ARGS+=("${IMAGE_BUILD_LABELS[@]}")
      fi

      # --- Build args:
      mapfile -d "" -t IMAGE_BUILD_ARGS < <(ci-image-build-args --separator null)
      if [[ -n "${IMAGE_BUILD_ARGS[@]}" ]]; then
        IMAGE_BUILD_CLI_ARGS+=("${IMAGE_BUILD_ARGS[@]}")
      fi

      # --- Secrets:
      mapfile -d "" -t IMAGE_BUILD_SECRETS < <(ci-image-build-secrets --separator null)
      if [[ -n "${IMAGE_BUILD_SECRETS[@]}" ]]; then
        IMAGE_BUILD_CLI_ARGS+=("${IMAGE_BUILD_SECRETS[@]}")
      fi


      # --- Cache, if applicable:
      if [[ "${IMAGE_BUILD_CACHE_FROM}" == "true" || "${IMAGE_BUILD_CACHE_TO}" == "true" ]]; then
        IMAGE_BUILD_CLI_ARGS+=(--layers)
      fi
      if [[ "${IMAGE_BUILD_CACHE_FROM}" == "true" ]]; then
        IMAGE_BUILD_CLI_ARGS+=(--cache-from=${IMAGE_AS_BUILT_CACHE_URI})
      fi
      if [[ "${IMAGE_BUILD_CACHE_TO}" == "true" &&  ${CI_COMMIT_REF_PROTECTED} == true ]]; then
        IMAGE_BUILD_CLI_ARGS+=(--cache-to=${IMAGE_AS_BUILT_CACHE_URI})
      fi

      # --- Context:
      # Should be the last argument (it's positional)
      IMAGE_BUILD_CLI_ARGS+=(${IMAGE_BUILD_CONTEXT})

      # --- Build the image
      log building "${IMAGE_AS_BUILT_URI}"
      podman image build "${IMAGE_BUILD_CLI_ARGS[@]}"


      # --- Push the interim build artifact
      podman image push --quiet ${IMAGE_AS_BUILT_URI}


# ============================================================================
# Unit tests this image
.image-unit-test:
  extends: .image-build
  stage: test
  variables:
    IMAGE_UNITTEST_CONTAINER_OUTPUT_DIR: /var/tmp
    IMAGE_UNITTEST_CONTAINER_OUTPUT_FILE: unit-test-results.xml
    IMAGE_UNITTEST_LOCAL_OUTPUT_DIR: .image-unit-test
    IMAGE_UNITTEST_LOCAL_FILE: unit-test-results.${CI_JOB_ID}.xml
  before_script:
    - |
      # --- image-unit-test (before_script) ----------------------------------
      if [[ -z "${IMAGE_BUILD_NAME}" ]]; then
        IMAGE_BUILD_NAME=${CI_PROJECT_NAME}
      fi
      IMAGE_BUILD_NAME+=-unit-test
    - !reference [.image-build, before_script]

  script:

    - !reference [.image-build, script]
    - |
      # --- image-unit-test --------------------------------------------------


      # --- Build the unit test target:
      log building "${IMAGE_BUILD_TARGET} target"
      podman image build "${IMAGE_BUILD_CLI_ARGS[@]}"


      # --- Prepare to capture the unit test output from the container
      #   - We mount a host directory into the container at the specified
      #     destination
      IMAGE_UNITTEST_CONTAINER_OUTPUT_DIR=${IMAGE_UNITTEST_CONTAINER_OUTPUT_DIR:-/var/tmp}
      IMAGE_UNITTEST_CONTAINER_OUTPUT_FILE=${IMAGE_UNITTEST_CONTAINER_OUTPUT_FILE:-unit-test-results.xml}
      IMAGE_UNITTEST_LOCAL_OUTPUT_DIR=${IMAGE_UNITTEST_LOCAL_OUTPUT_DIR:-.image-unit-test}
      IMAGE_UNITTEST_LOCAL_FILE=${IMAGE_UNITTEST_LOCAL_FILE:-unit-test-results.${CI_JOB_ID}.xml}
      IMAGE_UNITTEST_LOCAL_FILEPATH=${IMAGE_UNITTEST_LOCAL_OUTPUT_DIR}/${IMAGE_UNITTEST_LOCAL_FILE}

      mkdir -p ${IMAGE_UNITTEST_LOCAL_OUTPUT_DIR}


      # --- Run the unit test:
      #   - We disable the "exit on any error" logic, but capture the exit code
      #   - This allows us to print additional failure information to the Job
      #     log to make the failure investigation easier
      log testing "${IMAGE_AS_BUILT_URI}"
      set +e
      podman run  --rm  \
                  --tty  \
                  --volume ${IMAGE_UNITTEST_LOCAL_OUTPUT_DIR}:${IMAGE_UNITTEST_CONTAINER_OUTPUT_DIR}  \
                  ${IMAGE_AS_BUILT_URI}
      exit_code=$?
      set -e


      # --- Save the unit test artifact to the correct location for the Job:
      if [[ -f ${IMAGE_UNITTEST_LOCAL_OUTPUT_DIR}/${IMAGE_UNITTEST_CONTAINER_OUTPUT_FILE} ]]; then
        mv  ${IMAGE_UNITTEST_LOCAL_OUTPUT_DIR}/${IMAGE_UNITTEST_CONTAINER_OUTPUT_FILE}  ${IMAGE_UNITTEST_LOCAL_FILEPATH}
      fi


      # --- If the unit test failed, provide additional information to the Job
      #     output log
      #   - This is in-addition to the test report
      if [[ ${exit_code} -ne 0 ]] ; then
        log error "${EMOJI_REDX} unit test FAILED"

        if [[ -f ${IMAGE_UNITTEST_LOCAL_FILEPATH} ]]; then
          xq --color ${IMAGE_UNITTEST_LOCAL_FILEPATH}
        fi

        exit ${exit_code}
      fi
  artifacts:
    paths:
      - ${IMAGE_UNITTEST_LOCAL_OUTPUT_DIR}/${IMAGE_UNITTEST_LOCAL_FILE}
    reports:
      junit: ${IMAGE_UNITTEST_LOCAL_OUTPUT_DIR}/${IMAGE_UNITTEST_LOCAL_FILE}
    when: always
    expire_in: 1 week


# ============================================================================
# Use Google Container Structure Test to validate this image
.image-structure-test:
  extends: .image-base
  stage: test
  variables:
      CST_REPORT_FILEPATH: .image-structure-test/structure-test-results.${CI_JOB_ID}.xml
  before_script:
    - |
      # --- image-structure-test (before_script) -----------------------------
      log info "Running Podman service..."


      # --- Start Podman API service
      #   - CST requires a Docker-like daemon
      PODMAN_CI_JOB_SOCKET=/var/tmp/podman-${CI_JOB_ID}.sock
      export DOCKER_HOST=unix://${PODMAN_CI_JOB_SOCKET}
      podman system service --time=300 ${DOCKER_HOST} &
      PODMAN_SERVICE_PID=$!


      # --- Wait for the Podman API service to be ready
      #   - Since the podman service is run in the background, the socket may
      #     not be ready immediately
      #   - Below, we perform a few waits to allow the service to start
      PODMAN_CI_JOB_SOCKET_MAX_WAIT_RETRIES=5
      for i in $(seq 1 ${PODMAN_CI_JOB_SOCKET_MAX_WAIT_RETRIES}); do
        if [[ -e ${PODMAN_CI_JOB_SOCKET} ]]; then
          break
        fi

        sleep 1
      done


      # --- Detect failure condition for the Podman API service:
      if [[ ! -e ${PODMAN_CI_JOB_SOCKET} ]]; then
        log error "${EMOJI_REDX} Podman socket not created after ${PODMAN_CI_JOB_SOCKET_MAX_WAIT_RETRIES}s"
        exit 1
      fi
    - !reference [.image-base,  before_script]

  script:
    - |
      # --- image-structure-test (script) ------------------------------------


      # --- Pull the image that's about to be tested
      podman image pull --quiet ${IMAGE_AS_BUILT_URI}


      # --- Prepare the CLI
      mkdir -p $(dirname ${CST_REPORT_FILEPATH})

      CST_CLI_ARGS=()
      CST_CLI_ARGS+=(test)
      CST_CLI_ARGS+=(--output junit)
      CST_CLI_ARGS+=(--test-report ${CST_REPORT_FILEPATH})

      for file in ${IMAGE_STRUCTURE_TEST_FILENAMES}; do
        CST_CLI_ARGS+=(--config ${file})
      done

      CST_CLI_ARGS+=(--image ${IMAGE_AS_BUILT_URI})


      # --- Run the structure test:
      #   - We disable the "exit on any error" logic, but capture the exit code
      #   - This allows us to print additional failure information to the Job
      #     log to make the failure investigation easier
      log testing Container Structure
      set +e
      container-structure-test "${CST_CLI_ARGS[@]}"
      exit_code=$?
      set -e
      kill -9 "${PODMAN_SERVICE_PID}"

      # --- If the structure test failed, provide additional information to the
      #     Job output log
      #   - This is in-addition to the test report
      if [[ ${exit_code} -ne 0 ]] ; then
        log error "${EMOJI_REDX} container-structure-test FAILED"

        if [[ -f ${CST_REPORT_FILEPATH} ]]; then
          xq --color ${CST_REPORT_FILEPATH}
        fi

        exit ${exit_code}
      fi
  artifacts:
    paths:
      - ${CST_REPORT_FILEPATH}
    reports:
      junit: ${CST_REPORT_FILEPATH}
    when: always
    expire_in: 1 week



# ============================================================================
# Promotes this project's image by renaming from the interim build tag to the
# appropriate refs (e.g., CI_COMMIT_REF_NAME, GITLABCI_RELEASE_TRAIN, SEMANTIC_VERSION_SLUG)
.image-promote:
  extends: .image-base
  stage: publish
  script:
    - |
      # --- image-promote ----------------------------------------------------

      # --- Prepare the Release Notes:
      RELEASE_README_FILEPATH=.release/image.${CI_JOB_ID}.md
      mkdir -p $(dirname ${RELEASE_README_FILEPATH})

      echo "### Image: ${IMAGE_BUILD_NAME}" >> ${RELEASE_README_FILEPATH}


      # --- Determine the tags to push
      IMAGE_TAG_VARS=()

      #   - The original commit ref (branch or tag)
      IMAGE_TAG_VARS+=(CI_COMMIT_REF_NAME)

      #   - The GITLABCI_RELEASE_TRAIN, if enabled
      if [[ "${IMAGE_PROMOTE_RELEASE_TRAIN}" == "true" ]]; then
        IMAGE_TAG_VARS+=(GITLABCI_RELEASE_TRAIN)
      fi

      #   - The GITLABCI_SEMANTIC_VERSION, if enabled
      if [[ "${IMAGE_PROMOTE_SEMANTIC_VERSION}" == "true" ]]; then
        IMAGE_TAG_VARS+=(GITLABCI_SEMANTIC_VERSION)
      fi


      # --- Process each tag:
      for tag_var in ${IMAGE_TAG_VARS[@]}; do
        image_tag=${!tag_var}

        if [[ -z "${image_tag}" ]]; then
          continue
        fi

        # --- Image tags CANNOT contain the '+' character
        #     (from SemVer build metadata)
        image_tag=$(str-slug ${image_tag})

        # --- The 'description' is the human-readable name for the Release Notes
        #   - Remove the CI_ prefix, if present
        #   - Then convert to title case
        image_tag_description=${tag_var#CI_}
        image_tag_description=$(str-title-case ${image_tag_description})

        image_push_uri=${IMAGE_AS_BUILT_URI/%${IMAGE_AS_BUILT_VERSION}/${image_tag}}

        # --- Re-tag
        log publishing "${image_push_uri}"
        skopeo copy --quiet docker://${IMAGE_AS_BUILT_URI}  docker://${image_push_uri}


        # --- Append the tag information to the Release Notes:
        echo "- ${image_tag_description}"             >> ${RELEASE_README_FILEPATH}
        echo ""                                       >> ${RELEASE_README_FILEPATH}
        echo "  \`\`\`bash"                           >> ${RELEASE_README_FILEPATH}
        echo "  podman image pull ${image_push_uri}"  >> ${RELEASE_README_FILEPATH}
        echo "  \`\`\`"                               >> ${RELEASE_README_FILEPATH}
        echo ""                                       >> ${RELEASE_README_FILEPATH}
      done
  artifacts:
    paths:
      - .release
