# ============================================================================
.utilities//load-all:
  script:
    # NOTE: Order is important ('constants' must come before 'logging')
    - !reference [.utilities//constants,  script]
    - !reference [.utilities//string,     script]
    - !reference [.utilities//logging,    script]
    - !reference [.utilities//table,      script]


# ============================================================================
.utilities//string:
  script:
    - |
      # --- utilities//string (declarations) ---------------------------------
      if [[ -z "${UTILITIES_STRING__DEFINED}" ]]; then


        # --------------------------------------------------------------------
        # Converts the first letter of each word to Uppercase:
        function fn_str_title_case {
          local value="$*"

          value=${value,,}
          value=${value//_/ }
          value=${value//-/ }
          value=$(echo "${value}" | sed -E 's/(.)/\L\1/g; s/\b(.)/\U\1/g')

          echo ${value}
        }


        # --------------------------------------------------------------------
        # Returns a safe string after performing the following operations:
        #   - Replace all '/' with '-'
        #   - Replace all '+' with '.'
        #   - Transform to lowercase
        function fn_str_slug {
          local value="$*"

          value="${value//\//-}"
          value="${value//+/.}"
          value="${value,,}"

          echo ${value}
        }


        UTILITIES_STRING__DEFINED=true
      fi


# ============================================================================
.utilities//table:
  script:
    - |
      # --- utilities//table -------------------------------------------------
      if [[ -z "${UTILITIES_TABLE__DEFINED}" ]]; then


        # -------------------------------------------------------------------
        function fn_print_settings_table {
          local settings=("$@")
          local rows="==========;==========\n"

          if [[ -n "${settings[@]}" ]]; then

            for r in "${settings[@]}"; do
              rows+="${r}"'\n'
            done

            printf "${rows}" | column --table  \
                                      --separator ';' \
                                      --output-separator ' | '  \
                                      --table-column name=Setting \
                                      --table-column name=Value
          fi
        }

        UTILITIES_TABLE__DEFINED=true
      fi


# ============================================================================
.utilities//constants:
  script:
    - |
      # --- utilities//constants (declarations) ------------------------------

      if [[ -z "${UTILITIES_CONSTANTS__DEFINED}" ]]; then
        # --- ANSI colors
        readonly COLOR_BLACK=$'\e[30m'
        readonly COLOR_RED=$'\e[31m'
        readonly COLOR_GREEN=$'\e[32m'
        readonly COLOR_YELLOW=$'\e[33m'
        readonly COLOR_CYAN=$'\e[36m'
        readonly COLOR_BG_BLACK=$'\e[401m'
        readonly COLOR_BG_RED=$'\e[41m'
        readonly COLOR_BG_GREEN=$'\e[42m'
        readonly COLOR_BG_YELLOW=$'\e[43m'
        readonly COLOR_BG_CYAN=$'\e[46m'
        readonly COLOR_RESET=$'\e[0m'

        # --- Emoji
        readonly EMOJI_1ST_PLACE_MEDAL=$'🥇'
        readonly EMOJI_ATHLETIC_SHOE=$'👟'
        readonly EMOJI_BEACH_UMBRELLA=$'🏖️'
        readonly EMOJI_BLOSSOM=$'🌼'
        readonly EMOJI_BLUE_HEART=$'💙'
        readonly EMOJI_BOAT=$'⛵'
        readonly EMOJI_CLIPBOARD=$'📋'
        readonly EMOJI_DOWNARROW=$'⤵️'
        readonly EMOJI_FIRE=$'🔥'
        readonly EMOJI_GREEN_CIRCLE=$'🟢'
        readonly EMOJI_HAMMER_WRENCH=$'🛠️'
        readonly EMOJI_RAINBOW=$'🌈'
        readonly EMOJI_REDX=$'❌'
        readonly EMOJI_ROCKET=$'🚀'
        readonly EMOJI_SHELL=$'🐚'
        readonly EMOJI_TURTLE=$'🐢'
        readonly EMOJI_UNLOCK=$'🔓'
        readonly EMOJI_VIDEO_GAME=$'🎮'
        readonly EMOJI_WAFFLE=$'🧇'
        readonly EMOJI_XRAY=$'🩻'
        readonly EMOJI_YARN=$'🧶'
        readonly EMOJI_ZOMBIE=$'🧟'

        RANDOM_EMOJIS=()
        RANDOM_EMOJIS+=(${EMOJI_1ST_PLACE_MEDAL})
        RANDOM_EMOJIS+=(${EMOJI_ATHLETIC_SHOE})
        RANDOM_EMOJIS+=(${EMOJI_BEACH_UMBRELLA})
        RANDOM_EMOJIS+=(${EMOJI_BLOSSOM})
        RANDOM_EMOJIS+=(${EMOJI_BLUE_HEART})
        RANDOM_EMOJIS+=(${EMOJI_BOAT})
        RANDOM_EMOJIS+=(${EMOJI_RAINBOW})
        RANDOM_EMOJIS+=(${EMOJI_ROCKET})
        RANDOM_EMOJIS+=(${EMOJI_SHELL})
        RANDOM_EMOJIS+=(${EMOJI_TURTLE})
        RANDOM_EMOJIS+=(${EMOJI_UNLOCK})
        RANDOM_EMOJIS+=(${EMOJI_VIDEO_GAME})
        RANDOM_EMOJIS+=(${EMOJI_WAFFLE})
        RANDOM_EMOJIS+=(${EMOJI_XRAY})
        RANDOM_EMOJIS+=(${EMOJI_YARN})
        RANDOM_EMOJIS+=(${EMOJI_ZOMBIE})

        fn_random_emoji() {
          echo ${RANDOM_EMOJIS[$RANDOM % ${#RANDOM_EMOJIS[@]}]}
        }

        UTILITIES_CONSTANTS__DEFINED=true
      fi


# ============================================================================
.utilities//logging:
  script:
    - |
      # --- utilities//logging (declarations) --------------------------------

      if [[ -z "${UTILITIES_LOGGING__DEFINED}" ]]; then
        declare -A LOG_LEVEL_COLORS
        LOG_LEVEL_COLORS[DEBUG]=${COLOR_CYAN}
        LOG_LEVEL_COLORS[INFO]=${COLOR_GREEN}
        LOG_LEVEL_COLORS[WARNING]=${COLOR_YELLOW}
        LOG_LEVEL_COLORS[ERROR]=${COLOR_RED}
        LOG_LEVEL_COLORS[FATAL]=${COLOR_BLACK}${COLOR_BG_YELLOW}


        # ----------------------------------------------------------------------
        # Log a message (at the given log-level) to stderr.
        function fn_log_msg {
          local level=${1}; shift
          local color=${LOG_LEVEL_COLORS[${level}]}
          local message="$*"

          printf "${color}%-10s${COLOR_RESET}${message}\n" "${level}" >&2
        }


        # ----------------------------------------------------------------------
        function fn_log_debug    { fn_log_msg "DEBUG"   "$@"; }
        function fn_log_info     { fn_log_msg "INFO"    "$@"; }
        function fn_log_warning  { fn_log_msg "WARNING" "$@"; }
        function fn_log_error    { fn_log_msg "ERROR"   "$@"; }
        function fn_log_fatal    { fn_log_msg "FATAL"   "$@"; }


        # ----------------------------------------------------------------------
        function fn_log_building   { fn_log_info  "${EMOJI_HAMMER_WRENCH} Building $@ ..."; }
        function fn_log_testing    { fn_log_info  "${EMOJI_CLIPBOARD} Testing $@ ..."; }
        function fn_log_publishing { fn_log_info  "${EMOJI_ROCKET} Publishing $@ ..."; }


        UTILITIES_LOGGING__DEFINED=true
      fi
