# ============================================================================
.auth//ssh-remote-access:
  script:
    - |
      # --- auth//ssh-remote-access ------------------------------------------
      eval $(ssh-agent -s)
      chmod 400 "${SSH_PRIVATE_KEY_FILE}"
      ssh-add "${SSH_PRIVATE_KEY_FILE}"
      mkdir -p ~/.ssh && chmod 700 ~/.ssh
      cp "${SSH_KNOWN_HOSTS_FILE}" ~/.ssh/known_hosts
