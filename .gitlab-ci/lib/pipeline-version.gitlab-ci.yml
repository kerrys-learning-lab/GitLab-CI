include:
  - local: .gitlab-ci/lib/utilities.gitlab-ci.yml


# ============================================================================
.pipeline-version//load-all:
  script:
    - !reference [.utilities//load-all,                           script]
    - !reference [.pipeline-version//release-tag-regex,           script]
    - !reference [.pipeline-version//release-branch-regex,        script]
    - !reference [.pipeline-version//process-ci-commit-tag,       script]
    - !reference [.pipeline-version//process-ci-commit-branch,    script]
    - !reference [.pipeline-version//process-ci-commit-ref,       script]
    - !reference [.pipeline-version//calculate-pipeline-version,  script]


# ============================================================================
# Regex to match a release tag (SemVer)
.pipeline-version//release-tag-regex:
  script:
    - |
      # --- pipeline-version//release-tag-regex ------------------------------

      if [[ -z "${RELEASE_TAG_REGEX}" ]]; then
        #                                  +------------------------------------- Major (group 1)
        #                                  |
        #                                  |              +---------------------- Minor (group 2)
        #                                  |              |
        #                                  |              |                +----- Patch (group 3)
        #                                  |              |                |
        #                             vvvvvvvvvvvv    vvvvvvvvvvvv    vvvvvvvvvvvv
        readonly RELEASE_TAG_REGEX='v([[:digit:]]+)\.([[:digit:]]+)\.([[:digit:]]+)'
      fi


# ============================================================================
# Regex to match a release branch
.pipeline-version//release-branch-regex:
  script:
    - |
      # --- pipeline-version//release-branch-regex ---------------------------

      if [[ -z "${RELEASE_BRANCH_REGEX}" ]]; then
        #                                            +---------------------------- major (group 1)
        #                                            |
        #                                            |               +------------ minor (group 2)
        #                                            |               |
        #                                            |               |
        #                                            |               |
        #                                            |               |
        #                                       vvvvvvvvvvvv    vvvvvvvvvvvv
        readonly RELEASE_BRANCH_REGEX='release/([[:digit:]]+)\.([[:digit:]]+)'
      fi


# ============================================================================
# NOTE: These are formulated as Bash functions so that they are easy to
#       unit test using bashunit
# ============================================================================


# ============================================================================
# Pulls together the below functions into a single entry-point which\
# handles Release Tags, Release Branches, or none of the above
.pipeline-version//calculate-pipeline-version:
  script:
    - |
      # --- pipeline-version//calculate-pipeline-version ---------------------

      function fn_calculate_pipeline_version() {
        GITLABCI_PIPELINE_TIMESTAMP=${GITLABCI_PIPELINE_TIMESTAMP:-$(date --iso-8601=seconds)}
        GITLABCI_RELEASE_TRAIN=
        GITLABCI_SEMANTIC_VERSION=
        GITLABCI_SEMANTIC_VERSION_MAJOR=
        GITLABCI_SEMANTIC_VERSION_MINOR=
        GITLABCI_SEMANTIC_VERSION_PATCH=

        # --- This will fire if CI_COMMIT_TAG is set
        fn_pipeline_version__process_ci_commit_tag

        # --- This will fire if CI_COMMIT_BRANCH is set
        fn_pipeline_version__process_ci_commit_branch

        # --- If neither of the two functions above produced a SemVer based on
        #     the corresponding regex, this will produce a fall-back SemVer:
        fn_pipeline_version__process_ci_commit_ref
      }


# ============================================================================
# When CI_COMMIT_TAG is defined, produces a SemVer corresponding to the tag.
#
# NOTE: It is considered an error for a *protected* CI_COMMIT_TAG to
#       NOT match the SemVer regex above.
.pipeline-version//process-ci-commit-tag:
  script:
    - |
      # --- pipeline-version//process-ci-commit-tag --------------------------
      function fn_pipeline_version__process_ci_commit_tag () {
        if [[ -z "${CI_COMMIT_TAG}" ]]; then
          return
        fi

        if [[ ${CI_COMMIT_TAG} =~ ${RELEASE_TAG_REGEX} ]]; then
          if [[ "${CI_COMMIT_REF_PROTECTED}" == "false" ]]; then
            fn_log_error "❌  Release tags (vX.Y.Z) should be protected ❌"
            exit 3
          fi

          GITLABCI_SEMANTIC_VERSION_MAJOR=${BASH_REMATCH[1]}
          GITLABCI_SEMANTIC_VERSION_MINOR=${BASH_REMATCH[2]}
          GITLABCI_SEMANTIC_VERSION_PATCH=${BASH_REMATCH[3]}

          GITLABCI_RELEASE_TRAIN=${GITLABCI_SEMANTIC_VERSION_MAJOR}.${GITLABCI_SEMANTIC_VERSION_MINOR}
          GITLABCI_SEMANTIC_VERSION=${GITLABCI_RELEASE_TRAIN}.${GITLABCI_SEMANTIC_VERSION_PATCH}
        elif [[ "${CI_COMMIT_REF_PROTECTED}" == "true" ]]; then
          fn_log_error "❌  Protected tag (${CI_COMMIT_TAG}) is not a valid SemVer ❌"
          fn_log_error "    Expected vX.Y.Z"
          exit 3
        fi
      }


# ============================================================================
# When CI_COMMIT_BRANCH is defined, returns a SemVer corresponding to the branch.
#
# NOTE: It is considered an error for a *protected* CI_COMMIT_BRANCH to
#       NOT match the SemVer regex above, unless the CI_COMMIT_BRANCH
#       is the DEFAULT branch (a special case).
.pipeline-version//process-ci-commit-branch:
  script:
    - |
      # --- pipeline-version//process-ci-commit-branch -----------------------
      function fn_pipeline_version__process_ci_commit_branch () {
        if [[ -z "${CI_COMMIT_BRANCH}" ]]; then
          return
        fi

        if [[ ${CI_COMMIT_BRANCH} =~ ${RELEASE_BRANCH_REGEX} ]]; then
          if [[ "${CI_COMMIT_REF_PROTECTED}" == "false" ]]; then
            fn_log_error "❌  Release branches (release/X.Y) should be protected ❌"
            exit 3
          fi

          GITLABCI_SEMANTIC_VERSION_MAJOR=${BASH_REMATCH[1]}
          GITLABCI_SEMANTIC_VERSION_MINOR=${BASH_REMATCH[2]}
          GITLABCI_SEMANTIC_VERSION_PATCH=0

          GITLABCI_RELEASE_TRAIN=${GITLABCI_SEMANTIC_VERSION_MAJOR}.${GITLABCI_SEMANTIC_VERSION_MINOR}

          # NOTE: TAGS_FOR_RELEASE_TRAIN will only ever be pre-defined when testing
          TAGS_FOR_RELEASE_TRAIN=${TAGS_FOR_RELEASE_TRAIN:-$(git tag -l "v${GITLABCI_RELEASE_TRAIN}.*")}
          if [[ -n "${TAGS_FOR_RELEASE_TRAIN}" ]]; then
            for tag in ${TAGS_FOR_RELEASE_TRAIN}; do
              if [[ ${tag} =~ ${RELEASE_TAG_REGEX} ]]; then
                tag_patch_level=${BASH_REMATCH[3]}
                if [[ ${tag_patch_level} -gt ${GITLABCI_SEMANTIC_VERSION_PATCH} ]]; then
                  GITLABCI_SEMANTIC_VERSION_PATCH=${tag_patch_level}
                fi
              fi
            done

            # But, this is a release candidate for the *next* patch:
            GITLABCI_SEMANTIC_VERSION_PATCH=$((${GITLABCI_SEMANTIC_VERSION_PATCH} + 1))
          fi

          GITLABCI_SEMANTIC_VERSION=${GITLABCI_RELEASE_TRAIN}.${GITLABCI_SEMANTIC_VERSION_PATCH}-rc+${CI_PIPELINE_IID}
        elif [[ "${CI_COMMIT_REF_PROTECTED}" == true && ${CI_COMMIT_BRANCH} != ${CI_DEFAULT_BRANCH} ]]; then
            fn_log_error "❌  Protected branch (${CI_COMMIT_BRANCH}) is not valid ❌"
            fn_log_error "    Expected: 'release/X.Y'"
            exit 3
        fi
      }


# ============================================================================
# Processes CI_COMMIT_REFs that do not match the SemVer regexes above.
.pipeline-version//process-ci-commit-ref:
  script:
    - |
      # --- pipeline-version//process-ci-commit-ref --------------------------
      function fn_pipeline_version__process_ci_commit_ref() {
        if [[ -n "${GITLABCI_SEMANTIC_VERSION}" ]]; then
          return
        fi

        if [[ ${DEFAULT_SEMVER_PREFIX:-v0.0.0} =~ ${RELEASE_TAG_REGEX} ]]; then
          GITLABCI_SEMANTIC_VERSION_MAJOR=${BASH_REMATCH[1]}
          GITLABCI_SEMANTIC_VERSION_MINOR=${BASH_REMATCH[2]}
          GITLABCI_SEMANTIC_VERSION_PATCH=${BASH_REMATCH[3]}

          SEMANTIC_VERSION_COMMIT_SLUG=$(fn_str_slug ${CI_COMMIT_REF_NAME})
          GITLABCI_SEMANTIC_VERSION=${GITLABCI_SEMANTIC_VERSION_MAJOR}.${GITLABCI_SEMANTIC_VERSION_MINOR}.${GITLABCI_SEMANTIC_VERSION_PATCH}-${SEMANTIC_VERSION_COMMIT_SLUG}+${CI_PIPELINE_IID}

          if [[ ${CI_COMMIT_REF_PROTECTED} == true ]]; then
            GITLABCI_RELEASE_TRAIN=${SEMANTIC_VERSION_COMMIT_SLUG}
          fi
        else
          fn_log_error "❌  DEFAULT_SEMVER_PREFIX should match the semver regex ❌"
          fn_log_error "    Expected: ${RELEASE_TAG_REGEX}"
          fn_log_error "    Actual:   ${DEFAULT_SEMVER_PREFIX}"
          exit 6
        fi
      }
