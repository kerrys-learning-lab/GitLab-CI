include:
  - local: .gitlab-ci/lib/defaults.gitlab-ci.yml
  - local: .gitlab-ci/lib/stages.gitlab-ci.yml
  - local: .gitlab-ci/lib/image-settings.gitlab-ci.yml
  - local: .gitlab-ci/lib/pipeline-version.gitlab-ci.yml
  - local: .gitlab-ci/lib/utilities.gitlab-ci.yml


# ============================================================================
.image-base:
  before_script:
    - !reference [.image-settings//load-all,  script]
    - |
      # --- image-base -------------------------------------------------------

      # Default is to exit on any shell error:
      set -e


      # Authenticate to CI_REGISTRY:
      fn_log_info "Logging in to the CI_REGISTRY: ${CI_REGISTRY}..."

      podman login ${CI_REGISTRY} --username ${CI_REGISTRY_USER}  \
                                  --password ${CI_REGISTRY_PASSWORD}


      # Calculate the IMAGE_FULL_NAME, IMAGE_AS_BUILT_VERSION, and full
      # IMAGE_AS_BUILT_URI:
      fn_image_as_built_name_components


# ============================================================================
.image-build:
  stage: build
  extends: .image-base
  script:
    - |
      # --- image-build ------------------------------------------------------


      # --- Base image build-arg, if applicable:
      if [[ -n "${IMAGE_BUILD_BASE_IMAGE_NAME}" ]]; then
        BASE_IMAGE_AS_BUILT_FULL_NAME=${CI_REGISTRY_IMAGE}/${IMAGE_BUILD_BASE_IMAGE_NAME}
        BASE_IMAGE_AS_BUILT_FULL_NAME=${BASE_IMAGE_AS_BUILT_FULL_NAME}:${IMAGE_AS_BUILT_VERSION}
        IMAGE_BUILD_ARG_BASE_IMAGE=${BASE_IMAGE_AS_BUILT_FULL_NAME}
      fi


      # --- Calculate the image build CLI args:
      fn_image_calculate_build_cli
      fn_image_print_build_cli_args_table

      # --- Build the image
      fn_log_building ${IMAGE_AS_BUILT_URI}
      podman image build "${IMAGE_BUILD_CLI_ARGS[@]}"


      # --- Push the interim build artifact
      podman image push --quiet ${IMAGE_AS_BUILT_URI}


# ============================================================================
# Unit tests this image
.image-unit-test:
  extends: .image-build
  stage: test
  variables:
    IMAGE_UNITTEST_CONTAINER_OUTPUT_DIR: /var/tmp
    IMAGE_UNITTEST_CONTAINER_OUTPUT_FILE: unit-test-results.xml
    IMAGE_UNITTEST_LOCAL_OUTPUT_DIR: .image-unit-test
    IMAGE_UNITTEST_LOCAL_FILE: unit-test-results.${CI_JOB_ID}.xml
  script:
    - |
      # --- image-unit-test --------------------------------------------------


      # --- Calculate the image build CLI args:
      fn_image_calculate_build_cli


      # --- Build the unit test target:
      fn_log_building "${IMAGE_BUILD_TARGET} target"
      podman image build "${IMAGE_BUILD_CLI_ARGS[@]}"


      # --- Prepare to capture the unit test output from the container
      #   - We mount a host directory into the container at the specified
      #     destination
      IMAGE_UNITTEST_CONTAINER_OUTPUT_DIR=${IMAGE_UNITTEST_CONTAINER_OUTPUT_DIR:-/var/tmp}
      IMAGE_UNITTEST_CONTAINER_OUTPUT_FILE=${IMAGE_UNITTEST_CONTAINER_OUTPUT_FILE:-unit-test-results.xml}
      IMAGE_UNITTEST_LOCAL_OUTPUT_DIR=${IMAGE_UNITTEST_LOCAL_OUTPUT_DIR:-.image-unit-test}
      IMAGE_UNITTEST_LOCAL_FILE=${IMAGE_UNITTEST_LOCAL_FILE:-unit-test-results.${CI_JOB_ID}.xml}
      IMAGE_UNITTEST_LOCAL_FILEPATH=${IMAGE_UNITTEST_LOCAL_OUTPUT_DIR}/${IMAGE_UNITTEST_LOCAL_FILE}

      mkdir -p ${IMAGE_UNITTEST_LOCAL_OUTPUT_DIR}


      # --- Run the unit test:
      #   - We disable the "exit on any error" logic, but capture the exit code
      #   - This allows us to print additional failure information to the Job
      #     log to make the failure investigation easier
      fn_log_testing ${IMAGE_AS_BUILT_URI}
      set +e
      podman run  --rm  \
                  --tty  \
                  --volume ${IMAGE_UNITTEST_LOCAL_OUTPUT_DIR}:${IMAGE_UNITTEST_CONTAINER_OUTPUT_DIR}  \
                  ${IMAGE_AS_BUILT_URI}
      exit_code=$?
      set -e


      # --- Save the unit test artifact to the correct location for the Job:
      if [[ -f ${IMAGE_UNITTEST_LOCAL_OUTPUT_DIR}/${IMAGE_UNITTEST_CONTAINER_OUTPUT_FILE} ]]; then
        mv  ${IMAGE_UNITTEST_LOCAL_OUTPUT_DIR}/${IMAGE_UNITTEST_CONTAINER_OUTPUT_FILE}  ${IMAGE_UNITTEST_LOCAL_FILEPATH}
      fi


      # --- If the unit test failed, provide additional information to the Job
      #     output log
      #   - This is in-addition to the test report
      if [[ ${exit_code} -ne 0 ]] ; then
        fn_log_error "${EMOJI_REDX} unit test FAILED"

        if [[ -f ${IMAGE_UNITTEST_LOCAL_FILEPATH} ]]; then
          xq --color ${IMAGE_UNITTEST_LOCAL_FILEPATH}
        fi

        exit ${exit_code}
      fi
  artifacts:
    paths:
      - ${IMAGE_UNITTEST_LOCAL_OUTPUT_DIR}/${IMAGE_UNITTEST_LOCAL_FILE}
    reports:
      junit: ${IMAGE_UNITTEST_LOCAL_OUTPUT_DIR}/${IMAGE_UNITTEST_LOCAL_FILE}
    when: always
    expire_in: 1 week


# ============================================================================
# Use Google Container Structure Test to validate this image
.image-structure-test:
  extends: .image-base
  stage: test
  variables:
      CST_REPORT_FILEPATH: .image-structure-test/structure-test-results.${CI_JOB_ID}.xml
  script:
    - |
      # --- image-structure-test (script) ------------------------------------
      fn_log_info "Running Podman service..."


      # --- Start Podman API service
      #   - CST requires a Docker-like daemon
      PODMAN_CI_JOB_SOCKET=/var/tmp/podman-${CI_JOB_ID}.sock
      export DOCKER_HOST=unix://${PODMAN_CI_JOB_SOCKET}
      podman system service --time=30 ${DOCKER_HOST} &

      # --- Wait for the Podman API service to be ready
      #   - Since the podman service is run in the background, the socket may
      #     not be ready immediately
      #   - Below, we perform a few waits to allow the service to start
      PODMAN_CI_JOB_SOCKET_MAX_WAIT_RETRIES=5
      for i in $(seq 1 ${PODMAN_CI_JOB_SOCKET_MAX_WAIT_RETRIES}); do
        if [[ -e ${PODMAN_CI_JOB_SOCKET} ]]; then
          break
        fi

        sleep 1
      done


      # --- Detect failure condition for the Podman API service:
      if [[ ! -e ${PODMAN_CI_JOB_SOCKET} ]]; then
        fn_log_error "${EMOJI_REDX} Podman socket not created after ${PODMAN_CI_JOB_SOCKET_MAX_WAIT_RETRIES}s"
        exit 1
      fi


      # --- Pull the image that's about to be tested
      podman image pull --quiet ${IMAGE_AS_BUILT_URI}


      # --- Prepare the CLI
      mkdir -p $(dirname ${CST_REPORT_FILEPATH})

      CST_CLI_ARGS=()
      CST_CLI_ARGS+=(test)
      CST_CLI_ARGS+=(--output junit)
      CST_CLI_ARGS+=(--test-report ${CST_REPORT_FILEPATH})

      for file in ${IMAGE_STRUCTURE_TEST_FILENAMES}; do
        CST_CLI_ARGS+=(--config ${file})
      done

      CST_CLI_ARGS+=(--image ${IMAGE_AS_BUILT_URI})


      # --- Run the structure test:
      #   - We disable the "exit on any error" logic, but capture the exit code
      #   - This allows us to print additional failure information to the Job
      #     log to make the failure investigation easier
      fn_log_testing "Container Structure Test"
      set +e
      container-structure-test "${CST_CLI_ARGS[@]}"
      exit_code=$?
      set -e


      # --- If the structure test failed, provide additional information to the
      #     Job output log
      #   - This is in-addition to the test report
      if [[ ${exit_code} -ne 0 ]] ; then
        fn_log_error "${EMOJI_REDX} container-structure-test FAILED"

        if [[ -f ${CST_REPORT_FILEPATH} ]]; then
          xq --color ${CST_REPORT_FILEPATH}
        fi

        exit ${exit_code}
      fi
  artifacts:
    paths:
      - ${CST_REPORT_FILEPATH}
    reports:
      junit: ${CST_REPORT_FILEPATH}
    when: always
    expire_in: 1 week



# ============================================================================
# Promotes this project's image by renaming from the interim build tag to the
# appropriate refs (e.g., CI_COMMIT_REF_NAME, GITLABCI_RELEASE_TRAIN, SEMANTIC_VERSION_SLUG)
.image-promote:
  extends: .image-base
  stage: publish
  script:
    - |
      # --- image-promote ----------------------------------------------------

      # --- Prepare the Release Notes:
      RELEASE_README_FILEPATH=.release/image.${CI_JOB_ID}.md
      mkdir -p $(dirname ${RELEASE_README_FILEPATH})

      echo "### Image: ${IMAGE_BUILD_NAME}" >> ${RELEASE_README_FILEPATH}


      # --- Determine the tags to push
      IMAGE_TAG_VARS=()

      #   - The original commit ref (branch or tag)
      IMAGE_TAG_VARS+=(CI_COMMIT_REF_NAME)

      #   - The GITLABCI_RELEASE_TRAIN, if enabled
      if [[ "${IMAGE_PROMOTE_RELEASE_TRAIN}" == "true" ]]; then
        IMAGE_TAG_VARS+=(GITLABCI_RELEASE_TRAIN)
      fi

      #   - The GITLABCI_SEMANTIC_VERSION, if enabled
      if [[ "${IMAGE_PROMOTE_SEMANTIC_VERSION}" == "true" ]]; then
        IMAGE_TAG_VARS+=(GITLABCI_SEMANTIC_VERSION)
      fi


      # --- Process each tag:
      for tag_var in ${IMAGE_TAG_VARS[@]}; do
        image_tag=${!tag_var}

        if [[ -z "${image_tag}" ]]; then
          continue
        fi

        # --- Image tags CANNOT contain the '+' character
        #     (from SemVer build metadata)
        image_tag=$(fn_str_slug ${image_tag})

        # --- The 'description' is the human-readable name for the Release Notes
        #   - Remove the CI_ prefix, if present
        #   - Then convert to title case
        image_tag_description=${tag_var#CI_}
        image_tag_description=$(fn_str_title_case ${image_tag_description})

        image_push_uri=${IMAGE_AS_BUILT_URI/%${IMAGE_AS_BUILT_VERSION}/${image_tag}}

        # --- Re-tag
        fn_log_publishing ${image_push_uri}
        skopeo copy --quiet docker://${IMAGE_AS_BUILT_URI}  docker://${image_push_uri}


        # --- Append the tag information to the Release Notes:
        echo "- ${image_tag_description}"             >> ${RELEASE_README_FILEPATH}
        echo ""                                       >> ${RELEASE_README_FILEPATH}
        echo "  \`\`\`bash"                           >> ${RELEASE_README_FILEPATH}
        echo "  podman image pull ${image_push_uri}"  >> ${RELEASE_README_FILEPATH}
        echo "  \`\`\`"                               >> ${RELEASE_README_FILEPATH}
        echo ""                                       >> ${RELEASE_README_FILEPATH}
      done
  artifacts:
    paths:
      - .release
