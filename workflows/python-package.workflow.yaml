spec:
  inputs:
    CONTEXT:
      type: string
      default: .
    BUILD_TYPE:
      type: string
      default: uv
    UNITTESTS:
      type: boolean
      default: true
---
workflow:
  name: Python Package

variables:
  GITLABCI_PYTHON_BUILD_CONTEXT:  $[[ inputs.CONTEXT ]]
  GITLABCI_PYTHON_BUILD_TYPE:  $[[ inputs.BUILD_TYPE ]]
  GITLABCI_PYTHON_UNITTESTS:  $[[ inputs.UNITTESTS ]]

include:
  - project: $GITLABCI_DEFAULT_PIPELINE_PROJECT
    ref: $GITLABCI_DEFAULT_PIPELINE_REF
    file:
      - pipelines/.calculate-pipeline-version.yaml
      - pipelines/.check-project-settings.yaml
      - pipelines/python-package.pipeline.yaml

check-project-settings:
  extends: .check-project-settings

calculate-pipeline-version:
  extends: .calculate-pipeline-version

build-python-package:
  extends: .build-python-package

test-python-package:
  extends: .test-python-package

push-python-package:
  extends: .push-python-package
