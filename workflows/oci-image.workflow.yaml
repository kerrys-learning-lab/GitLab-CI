spec:
  inputs:
    DOCKERFILE:
      type: string
      default: Dockerfile
    CONTEXT:
      type: string
      default: .
    TARGET:
      type: string
      default: <default>
    UNITTESTS:
      type: boolean
      default: true

---
workflow:
  name: OCI Image

variables:
  GITLABCI_BUILD_IMAGE_DOCKERFILE: $[[ inputs.DOCKERFILE ]]
  GITLABCI_BUILD_IMAGE_CONTEXT:  $[[ inputs.CONTEXT ]]
  GITLABCI_BUILD_IMAGE_TARGET:  $[[ inputs.TARGET ]]
  GITLABCI_IMAGE_UNITTESTS:  $[[ inputs.UNITTESTS ]]

include:
  - local: ./pipelines/.check-project-settings.yaml
  - local: ./pipelines/oci-image.pipeline.yaml

check-project-settings:
  extends: .check-project-settings

build-image:
  extends: .build-image

push-image:
  extends: .push-image
