# ----------------------------------------------------------------------------
# Unit tests this project
unittest:
  image: ${GITLABCI_DEFAULT_IMAGE_NAME}:${GITLABCI_DEFAULT_IMAGE_VERSION}
  stage: test
  script:
    - ${GITLABCI_SCRIPT} python --project-root .
                                --build-type uv
                                test
  needs: []
  artifacts:
    paths:
      - ./.build/test-results
    reports:
      coverage_report:
        coverage_format: cobertura
        path: ./.build/test-results/coverage.xml
      junit: ./.build/test-results/unit-tests.xml
    expire_in: 1 week


# ----------------------------------------------------------------------------
# Tests (verifies) the ability to build/push Helm Charts
helmtest:
  image: ${GITLABCI_DEFAULT_IMAGE_NAME}:${GITLABCI_DEFAULT_IMAGE_VERSION}
  stage: test
  script:
    - mkdir -p ./.build/charts
    - ${GITLABCI_SCRIPT} helm  --dependencies ${LOCAL_HELM_DEPENDENCIES}
                                build  --chart-dir test/helm
                                      --output-dir ./.build/charts
    - ${GITLABCI_SCRIPT} helm  --dependencies ${LOCAL_HELM_DEPENDENCIES}
                                push   --channel devel
                                      ./.build/charts/*.tgz
  needs: []


# ----------------------------------------------------------------------------
# Pushes this project's image(s) to the container registry
push-image:
  image: ${GITLABCI_DEFAULT_IMAGE_NAME}:${GITLABCI_DEFAULT_IMAGE_VERSION}
  stage: publish
  before_script:
    - !reference ['.configure-podman-access', 'script']
  script:
    - ${GITLABCI_SCRIPT} image push ./.build/images/*.yaml
  needs:
    - build-image
    - unittest
    - helmtest
  rules:
    - if: $CI_COMMIT_REF_PROTECTED =~ /true/
    - if: $GITLABCI_PUSH_IMAGE_FORCE =~ /true/


# ----------------------------------------------------------------------------
# Pushes this project's Python package to the package registry
push-python-package:
  image: ${GITLABCI_DEFAULT_IMAGE_NAME}:${GITLABCI_DEFAULT_IMAGE_VERSION}
  stage: publish
  script:
    - ${GITLABCI_SCRIPT}  --verbose  python --project-root .
                                            --build-type uv
                                            push
  needs:
    - build-python-package
    - unittest
    - helmtest
  rules:
    - if: $CI_COMMIT_REF_PROTECTED =~ /true/
    - if: $GITLABCI_PUSH_PYTHON_FORCE =~ /true/


# ----------------------------------------------------------------------------
# Test creating a tarfile of this project
build-tar-package:
  extends: .build-tar-package


# ----------------------------------------------------------------------------
# Push this projects tarfile package to the package registry
push-tar-package:
  extends: .push-tar-package
