# ============================================================================
include:
  - local: templates/pipeline-version.job.yml
  - local: templates/release.job.yml
  - local: .gitlab-ci/jobs/.bashunit.gitlab-ci.yml
  - local: .gitlab-ci/jobs/.image.gitlab-ci.yml
  - local: .gitlab-ci/lib/image-settings.gitlab-ci.yml
  - local: .gitlab-ci/lib/pipeline-version.gitlab-ci.yml
  - local: .gitlab-ci/lib/stages.gitlab-ci.yml
  - local: ci-cd-examples/base-and-derived-images/.gitlab-ci.yml
  - local: ci-cd-examples/helm-chart/.gitlab-ci.yml
  - local: ci-cd-examples/simple-image/.gitlab-ci.yml
  - local: ci-cd-examples/terraform/.gitlab-ci.yml
  - local: ci-cd-examples/test_ansible_collection/.gitlab-ci.yml
  - local: ci-cd-examples/test_ansible_playbook/.gitlab-ci.yml



# ============================================================================
bash unit-test:
  extends: .bash-unit-test
  variables:
    BASH_UNITTEST_TEST_PATH: tests/*.test.sh
  before_script:
    - !reference [.utilities//load-all,         script]
    - !reference [.pipeline-version//load-all,  script]
    - !reference [.image-settings//load-all,    script]
    - |
      # --- bash unit-test (before_script) -----------------------------------

      # These environment variables need to be exported to the bashunit
      # context:
      BASH_UNITTEST_EXPORT_ENV+="$(compgen -v RELEASE_) "

      # These bash functions (from the !reference above) need to be exported to
      # the bashunit context:
      BASH_UNITTEST_EXPORT_FUNCTIONS="$(compgen -A function fn_)"
