# NOTE: All jobs in this project's Pipeline use the source code contained in
#       the pulled repository (vice the source code present in the image).
#
#       Basically, we're dog-fooding the build pipeline using the current Git
#       ref.
include:
  - local: pipelines/.configure-access.yaml
  - local: pipelines/.stages.yaml
  - local: pipelines/.defaults.yaml
  - local: pipelines/tarfile-package.pipeline.yaml

variables:
  PYTHONPATH: ./src
  GITLABCI_SCRIPT: uv run ./src/gitlab-ci.py
  LOCAL_HELM_DEPENDENCIES: ./data/helm-repo-dependencies.yaml

.configure-podman-access:
  script:
    - export EPHEMERAL_REGISTRY_CONF_PATH=/etc/containers/registries.conf.d/ephemeral-registry.conf
    - |
      if [[ -n "${GITLABCI_EPHEMERAL_REGISTRY_URL}" && ! -f ${EPHEMERAL_REGISTRY_CONF_PATH} ]]; then
        cat > ${EPHEMERAL_REGISTRY_CONF_PATH} <<__EOF
          [[registry]]
          location = "${GITLABCI_EPHEMERAL_REGISTRY_URL}"
          insecure = true
      __EOF
      fi
    - podman login ${CI_REGISTRY} --username ${CI_REGISTRY_USER}
                                  --password ${CI_REGISTRY_PASSWORD}


# ----------------------------------------------------------------------------
# Checks this project's settings for conformance.
check-project-settings:
  image: ${GITLABCI_DEFAULT_IMAGE_NAME}:${GITLABCI_DEFAULT_IMAGE_VERSION}
  stage: .pre
  script:
    - ${GITLABCI_SCRIPT} project --expectations ./data/project-expectations.yaml ${CI_PROJECT_ID}
  allow_failure: true


# ----------------------------------------------------------------------------
# Checks this pipeline's version information.
calculate-pipeline-version:
  image: ${GITLABCI_DEFAULT_IMAGE_NAME}:${GITLABCI_DEFAULT_IMAGE_VERSION}
  stage: .pre
  script:
    - id
    - pwd
    - ls -alF
    - ${GITLABCI_SCRIPT} pipeline version --to-file ./version.env --force
  artifacts:
    reports:
      dotenv: ./version.env


# ----------------------------------------------------------------------------
# Builds and saves the Python package for this project
build-python-package:
  image: ${GITLABCI_DEFAULT_IMAGE_NAME}:${GITLABCI_DEFAULT_IMAGE_VERSION}
  stage: build
  script:
    - ${GITLABCI_SCRIPT} python --project-root .
                                --build-type uv
                                build
  needs: []
  artifacts:
    paths:
      - ./dist
    expire_in: 1 week


# ----------------------------------------------------------------------------
# Builds and saves the OCI image for this project
build-image:
  image: ${GITLABCI_DEFAULT_IMAGE_NAME}:${GITLABCI_DEFAULT_IMAGE_VERSION}
  stage: build
  before_script:
    - !reference ['.configure-podman-access', 'script']
  script:
    - mkdir -p ./.build/images
    - export PYTHONPATH=./src:${PYTHONPATH}
    - |
      if [[ -n "${GITLABCI_EPHEMERAL_REGISTRY_URL}" ]];  then
        ${GITLABCI_SCRIPT} image build  --push-registry ${GITLABCI_EPHEMERAL_REGISTRY_URL} \
                                        --output-dir ./.build/images
      else
        ${GITLABCI_SCRIPT} image build  --save-file \
                                        --output-dir ./.build/images
      fi
  needs: []
  artifacts:
    paths:
      - ./.build/images
    expire_in: 1 week


