# NOTE: All jobs in this project's Pipeline use the source code contained in
#       the pulled repository (vice the source code present in the image).
#
#       Basically, we're dog-fooding the build pipeline using the current Git
#       ref.

stages:
  - .pre
  - build
  - test
  - publish
  - .post

variables:
  PYTHONPATH: ./src
  GITLABCI_SCRIPT: ./src/gitlab-ci.py
  LOCAL_HELM_DEPENDENCIES: ./src/data/helm-repo-dependencies.yaml

.configure-registries:
  script:
    - export EPHEMERAL_REGISTRY_CONF_PATH=/etc/containers/registries.conf.d/ephemeral-registry.conf
    - |
      if [[ -n "${GITLABCI_EPHEMERAL_REGISTRY_URL}" && ! -f ${EPHEMERAL_REGISTRY_CONF_PATH} ]]; then
        cat > ${EPHEMERAL_REGISTRY_CONF_PATH} <<__EOF
          [[registry]]
          location = "${GITLABCI_EPHEMERAL_REGISTRY_URL}"
          insecure = true
      __EOF
      fi
    - podman login ${CI_REGISTRY} --username ${CI_REGISTRY_USER}
                                  --password ${CI_REGISTRY_PASSWORD}


# ----------------------------------------------------------------------------
# Checks this project's settings for conformance.
check-project-settings:
  image: registry.westsidestreet.net/kerrys-learning-lab/devsecops/gitlab-ci/gitlab-ci:main
  stage: .pre
  script:
    - ${GITLABCI_SCRIPT} project --expectations ./src/data/project-expectations.yaml ${CI_PROJECT_ID}
  allow_failure: true


# ----------------------------------------------------------------------------
# Checks this project's settings for conformance.
calculate-pipeline-version:
  image: registry.westsidestreet.net/kerrys-learning-lab/devsecops/gitlab-ci/gitlab-ci:main
  stage: .pre
  script:
    - ${GITLABCI_SCRIPT} pipeline version --to-file ./version.env --force
  artifacts:
    reports:
      dotenv: ./version.env


# ----------------------------------------------------------------------------
# Builds and saves the OCI image for this project
build-python-package:
  image: registry.westsidestreet.net/kerrys-learning-lab/devsecops/gitlab-ci/gitlab-ci:main
  stage: build
  script:
    - ${GITLABCI_SCRIPT} python build
  needs: []
  artifacts:
    paths:
      - ./dist
    expire_in: 1 week


# ----------------------------------------------------------------------------
# Builds and saves the OCI image for this project
build-image:
  image: registry.westsidestreet.net/kerrys-learning-lab/devsecops/gitlab-ci/gitlab-ci:main
  stage: build
  before_script:
    - !reference ['.configure-registries', 'script']
  script:
    - mkdir -p ./.build/images
    - export PYTHONPATH=./src:${PYTHONPATH}
    - |
      if [[ -n "${GITLABCI_EPHEMERAL_REGISTRY_URL}" ]];  then
        ${GITLABCI_SCRIPT} image build  --push-registry ${GITLABCI_EPHEMERAL_REGISTRY_URL} \
                                        --output-dir ./.build/images
      else
        ${GITLABCI_SCRIPT} image build  --save-file \
                                        --output-dir ./.build/images
      fi
  needs: []
  artifacts:
    paths:
      - ./.build/images
    expire_in: 1 week


# ----------------------------------------------------------------------------
# Builds and saves a Python package for this project
build-python-package:
  image: registry.westsidestreet.net/kerrys-learning-lab/devsecops/gitlab-ci/gitlab-ci:main
  stage: build
  script:
    - ${GITLABCI_SCRIPT}  --verbose python --project-name gitlabci build
  needs: []
  artifacts:
    paths:
      - ./dist
    expire_in: 1 week


# ----------------------------------------------------------------------------
# Tests the data preparation job for ML Pipelines
prepare-data:
  image: registry.westsidestreet.net/kerrys-learning-lab/devsecops/gitlab-ci/gitlab-ci:main
  stage: build
  variables:
    PYTHONPATH: ./src:./test
  script:
    - ${GITLABCI_SCRIPT}  ml
                          data
                          prepare
                          gitlabci_test.ml.data.example_data_prepare.TrainTestData
  needs: []
  artifacts:
    paths:
      - ./.data/*.npz


# ----------------------------------------------------------------------------
# Unit tests this project
unittest:
  image: registry.westsidestreet.net/kerrys-learning-lab/devsecops/gitlab-ci/gitlab-ci:main
  stage: test
  script:
    - mkdir -p ./.build/test-results
    - export TEST_IMAGE_NAME=$(${GITLABCI_SCRIPT} image build --target test --name-only)
    - ${GITLABCI_SCRIPT} image build  --target test
    - podman run  --rm
                  --interactive
                  --tty
                  --volume ./.build/test-results:/var/tmp
                  ${TEST_IMAGE_NAME}
  needs: []
  artifacts:
    paths:
      - ./.build/test-results/unit-tests.xml
    reports:
      junit: ./.build/test-results/unit-tests.xml
    expire_in: 1 week


# ----------------------------------------------------------------------------
# Tests (verifies) the ability to build/push Helm Charts
helmtest:
  image: registry.westsidestreet.net/kerrys-learning-lab/devsecops/gitlab-ci/gitlab-ci:main
  stage: test
  script:
    - mkdir -p ./.build/charts
    - ${GITLABCI_SCRIPT} helm  --dependencies ${LOCAL_HELM_DEPENDENCIES}
                                build  --chart-dir test/helm
                                      --output-dir ./.build/charts
    - ${GITLABCI_SCRIPT} helm  --dependencies ${LOCAL_HELM_DEPENDENCIES}
                                push   --channel devel
                                      ./.build/charts/*.tgz
  needs: []


# ----------------------------------------------------------------------------
# Pushes this project's image(s) to the container registry
push-image:
  image: registry.westsidestreet.net/kerrys-learning-lab/devsecops/gitlab-ci/gitlab-ci:main
  stage: publish
  before_script:
    - !reference ['.configure-registries', 'script']
  script:
    - ${GITLABCI_SCRIPT} image push ./.build/images/*.yaml
  needs:
    - build-image
    - unittest
    - helmtest
  rules:
    - if: $CI_COMMIT_REF_PROTECTED =~ /true/
    - if: $GITLABCI_PUSH_IMAGE_FORCE =~ /true/


# ----------------------------------------------------------------------------
# Pushes this project's Python package to the container registry
push-python-package:
  image: registry.westsidestreet.net/kerrys-learning-lab/devsecops/gitlab-ci/gitlab-ci:main
  stage: publish
  script:
    - ${GITLABCI_SCRIPT}  --verbose python --project-name gitlabci push
  needs:
    - build-python-package
    - unittest
    - helmtest
  rules:
    - if: $CI_COMMIT_REF_PROTECTED =~ /true/
    - if: $GITLABCI_PUSH_PYTHON_FORCE =~ /true/
